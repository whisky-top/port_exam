ocated upwind of the city; the coal terminal yard capacity is taken as 5%–8% of the design throughput capacity; yard spacing is determined by wind protection requirements", "B": "The yard should be located downwind of the city; the coal terminal yard capacity is taken as 10%–15% of the design throughput capacity; the unit storage capacity for iron ore yards is 2.5–4.0 t/m²; wind-proof and dust-suppression nets are required", "C": "The yard location is not affected by wind direction; the coal terminal yard capacity is taken as 20%–30% of the design throughput capacity; the unit storage capacity for iron ore yards is 5.0–7.0 t/m²", "D": "The yard should be located downwind of the city; the coal terminal yard capacity is taken as 30%–40% of the design throughput capacity; grain terminals should preferably use open yards"}, "a": "B"}, {"u": 4, "q": "Regarding the land-side layout of container terminals, which of the following statements is correct?", "o": {"A": "The quay-side operation zone width is not less than 30 m; the land-side depth is generally 400–600 m; the yard is arranged in laden-container and empty-container zones; rail-mounted gantry cranes can stack containers up to 7–8 tiers", "B": "The quay-side operation zone width is not less than 45 m; the land-side depth for trunk-line terminals is 800–1,200 m; the yard is divided into front yard (storage period ≤ 3 d) and rear yard (storage period 7–10 d); rubber-tired gantry cranes stack containers 4–5 tiers high", "C": "The quay-side operation zone width is not less than 60 m; the land-side depth is generally 1,200–1,500 m; the container stuffing/stripping ratio should not exceed 25%; the number of gate lanes is unrelated to annual throughput", "D": "The quay-side operation zone width is not less than 25 m; the land-side depth for feeder terminals is 400–600 m; the front yard storage period is 7–10 d; empty containers are stacked no more than 3 tiers high"}, "a": "B"}, {"u": 4, "q": "Regarding the land-side layout of general cargo multi-purpose terminals, which of the following statements is correct?", "o": {"A": "The total width of the quay-side operation zone should be 20–30 m; the terminal depth is generally 500–800 m; layouts are classified into two types based on cargo: front-warehouse type and rear-yard type", "B": "The total width of the quay-side operation zone should be 40–50 m; the terminal depth is generally 250–400 m; layouts are classified into three types: front-warehouse type, front-yard type, and semi-warehouse-semi-yard type", "C": "The total width of the quay-side operation zone should be 60–80 m; the terminal depth is generally 600–1000 m; layouts are classified into four types including front-warehouse type and front-yard type", "D": "The total width of the quay-side operation zone should be 30–40 m; the terminal depth is generally 400–600 m; layout classification does not consider cargo type"}, "a": "B"}, {"u": 4, "q": "A butterfly mooring terminal uses circular caisson structures for both mooring dolphins and breasting dolphins. By which criterion should their top elevation be determined? And what is the reason that the elevation may be appropriately reduced after technical justification.", "o": {"A": "Determined by the overtopping control criterion; reason for elevation reduction: circular caissons are solid structures not controlled by structural force criteria; lowering the top elevation cuts concrete consumption and lowers construction costs.", "B": "Determined by the structural force control criterion; reason for elevation reduction: isolated dolphins produce weak wave reflection and low wave run-up, accommodate no precision instruments, and can sustain large overtopping discharge.", "C": "Determined by the overtopping control criterion; reason for elevation reduction: isolated dolphins produce weak wave reflection and low wave run-up, accommodate no precision instruments, and can tolerate moderately increased overtopping discharge.", "D": "Determined by the structural force control criterion; reason for elevation reduction: open sea conditions feature significant wave heights; lowering the elevation reduces wind-facing area and optimizes structural performance."}, "a": "C"}, {"u": 4, "q": "Regarding the definition of \"allowable wave height for vessel mooring at the berth,\" which of the following statements is correct?", "o": {"A": "The allowable wave height for mooring refers to the wave height at which cargo handling can be conducted at the berth", "B": "The allowable wave height for mooring refers to the maximum wave height at which a vessel can be safely moored at the berth", "C": "The allowable wave height for mooring and the allowable wave height for cargo handling are different expressions of the same concept", "D": "The allowable wave height for mooring is determined by the performance of cargo handling equipment"}, "a": "B"}, {"u": 4, "q": "Regarding China's adoption of H4% as the standard for the allowable wave height for cargo handling at berths, which of the following understandings is correct? H4%.", "o": {"A": "H4% is the internationally recognized optimal standard, including USA and Japan", "B": "H4% was chosen by China based on the statistical convention of measured data from wave observation stations", "C": "H4% is adopted because it yields a conservative wave height design value", "D": "Terminals designed using H4% are more economical than those designed using H13%"}, "a": "B"}, {"u": 4, "q": "Regarding narrow piers versus wide piers, which of the following statements is correct?", "o": {"A": "Narrow piers are suitable for container terminals because they can meet the demand for large-area container yards", "B": "Wide piers are suitable for bulk cargo terminals because they can reduce water area occupation", "C": "Narrow piers are suitable for bulk cargo terminals because their collection and distribution systems mostly use pipelines or continuous conveying systems", "D": "Narrow piers and wide piers serve exactly the same cargo types; they differ only in width"}, "a": "C"}, {"u": 4, "q": "Large open-type offshore terminals (such as oil terminals) often adopt a butterfly (dolphin) mooring arrangement. Which of the following is NOT a component of such an arrangement?", "o": {"A": "Working platform", "B": "Breasting dolphin", "C": "Mooring dolphin", "D": "Stacker/reclaimer"}, "a": "D"}, {"u": 4, "q": "The margin length for berths in semi-sheltered and open-type terminal straight-type layouts should be appropriately increased. Which of the following most accurately explains the reason for increasing the margin length?", "o": {"A": "Open-sea areas have larger waves, requiring a longer quay to resist waves", "B": "Wind, wave, and current conditions in open waters are complex, and position deviations and uncertainties during vessel berthing and unberthing increase significantly", "C": "The handling equipment at open-type terminals requires a longer working face", "D": "The design vessel size for open-type terminals is inherently longer"}, "a": "B"}, {"u": 4, "q": "Regarding the relationship between cargo handling efficiency and vessel motion magnitude, which of the following descriptions is correct?", "o": {"A": "Cargo handling efficiency remains nearly constant within the allowable range of vessel motion", "B": "Cargo handling efficiency gradually decreases as vessel motion increases, approaching zero", "C": "As vessel motion increases, once a critical motion threshold is exceeded, handling efficiency drops abruptly to zero", "D": "As vessel motion increases, handling efficiency first remains constant, then gradually decreases until approaching zero"}, "a": "C"}, {"u": 4, "q": "Regarding the force distribution among head/stern lines, breast lines, and spring lines at butterfly mooring terminals, according to the code commentary, which of the following descriptions is correct?", "o": {"A": "Head/stern lines resist longitudinal loads, breast lines resist transverse loads, and spring lines assist in controlling longitudinal displacement", "B": "Breast lines play the primary role in restraining transverse displacement, and spring lines play the primary role in restraining longitudinal displacement", "C": "Head/stern lines, having the smallest angle with the vessel's longitudinal axis, are the primary lines resisting longitudinal loads", "D": "Head/stern lines, breast lines, and spring lines have comparable restraining effects on both transverse and longitudinal loads"}, "a": "B"}, {"u": 4, "q": "According to China's Design Code of General Layout for Sea Ports (JTS 165–2025), the wave cumulative frequency adopted for the allowable wave height for cargo handling operations at berths is.", "o": {"A": "1%", "B": "4%", "C": "5%", "D": "13%"}, "a": "B"}, {"u": 4, "q": "Regarding layout along the inner side of a breakwater, which of the following statements is correct?", "o": {"A": "Wave overtopping has no impact on terminal operations, and all cargo types can be arranged along the breakwater", "B": "When arranged along the breakwater, the water area is completely unaffected by waves and requires no wave protection measures", "C": "Berths can be arranged along the deep-water section of the breakwater to reduce dredging costs, but fixed handling equipment should not be installed in areas with severe overtopping", "D": "Layout along the inner side of a breakwater is only applicable to container terminals"}, "a": "C"}, {"u": 4, "q": "For the straight-type layout of a single berth at a sheltered terminal, the berth length formula is Lb = L + 2d, where d is the clearance/margin length. According to the China Design Code of General Layout for Sea Ports, which of the following is INCORRECT?", "o": {"A": "The value of d is related to the cargo type of the vessel being berthed", "B": "The value of d increases with increasing design vessel length", "C": "The function of d includes compensating for the difference in length between the design vessel type and the vessels actually calling at the port", "D": "The function of d includes ensuring safe vessel berthing, unberthing, and mooring"}, "a": "A"}, {"u": 4, "q": "Regarding butterfly mooring terminals, which of the following statements is correct?", "o": {"A": "The working platform and breasting dolphins work together to accommodate vessel berthing", "B": "The same dolphin structure can serve both as a breasting dolphin and as a mooring dolphin", "C": "Head/stern lines primarily resist transverse loads, while breast lines primarily resist longitudinal loads", "D": "The working platform performs the cargo handling function, while the breasting dolphin performs the vessel berthing function"}, "a": "D"}, {"u": 4, "q": "Regarding the berth length of an open-type terminal with butterfly mooring arrangement, which of the following statements is correct?", "o": {"A": "Lb = L + 2d, where d is taken as the design vessel width", "B": "Lb = L + 2d, where d is determined by the design vessel length", "C": "Lb = kL, where k = 1.1–1.3", "D": "Lb = kL, where k = 1.4–1.5"}, "a": "C"}, {"u": 4, "q": "Regarding the effect of informatization and automation on improving port efficiency, which of the following statements is correct?", "o": {"A": "Fully automated terminal handling processes for container terminals improve handling efficiency and reduce error rates, but are only applicable to new-build terminals", "B": "Terminal Operating Systems (TOS) directly improve AWT by shortening auxiliary handling time", "C": "Dry bulk terminals cannot implement informatization management", "D": "If after automation retrofitting of a container terminal, the quay crane utilization rate increases to 0.8–0.9 and AWT/AST drops from 0.12 to 0.06, this indicates that after the efficiency improvement from automation, the optimal number of berths must be reassessed"}, "a": "D"}, {"u": 4, "q": "A port currently has a berth utilization rate ρ = 0.4, average vessel waiting time of only 0.2 days, and average service time of 2.5 days. Regarding the evaluation of this port's service level, which of the following statements is correct? ρ=0.4, AWT=0.2d, AST=2.5d →.", "o": {"A": "Berth utilization ρ should be used as the service level evaluation indicator; the closer ρ is to 1.0, the more fully port facilities are utilized and the higher the service level", "B": "Average vessel waiting time AWT should be used as the service level evaluation indicator; the current AWT = 0.2 d is an excellent level, and the number of berths should not be reduced", "C": "AWT/AST should be used as the service level evaluation indicator. The current ratio is 0.08, below 0.1, indicating extremely short vessel waiting", "D": "Annual port throughput Q should be used as the service level evaluation indicator; the higher the throughput, the higher the port service level"}, "a": "C"}, {"u": 4, "q": "Regarding the suitability of the trestle-type (offshore) layout for different cargo types, which of the following judgments is correct?", "o": {"A": "Container terminals are not suitable for trestle-type layout; dry bulk and liquid bulk terminals can adopt it", "B": "Neither container terminals nor dry bulk terminals are suitable for trestle-type layout; only liquid bulk terminals can adopt it", "C": "Container terminals, dry bulk terminals, and liquid bulk terminals are all suitable for trestle-type layout", "D": "Container terminals are most suitable for trestle-type layout, and dry bulk terminals are also fully adaptable"}, "a": "A"}, {"u": 5, "q": "For a port with a silty seabed, where the approach channel axis is nearly perpendicular to the depth contours and has a relatively large angle with the peak flood and ebb current directions, without prioritizing optimal current navigation conditions, which principle of channel alignment selection does this design logic reflect? Channel alignment selection is the result of a multi-objecti.", "o": {"A": "Navigation safety is the sole critical principle; current conditions have little impact on safety and can be directly ignored.", "B": "Channel alignment selection is the result of a multi-objective trade-off balancing safety, technical feasibility, economics, and maintenance considerations.", "C": "To minimize channel length to the greatest extent, the impact of current crossing angle on navigation can be disregarded.", "D": "For ports with severe sedimentation, the sole priority of channel alignment selection is to reduce dredging and maintenance costs."}, "a": "B"}, {"u": 5, "q": "During vessel navigation in a channel, the increase in vessel draft due to motion specifically includes increases caused by which two reasons? vessel squat during transit and wave-induced vessel sinkage.", "o": {"A": "water level variation errors and chart survey errors", "B": "vessel squat during transit and wave-induced vessel sinkage", "C": "anchoring obstructions and reduced rudder effectiveness", "D": "risk of keel bottom-touching and insufficient dredging advance for sedimentation"}, "a": "B"}, {"u": 5, "q": "Based on the conditions considered, the under-keel clearance (UKC) of a navigation channel can be classified into: under-keel clearance to prevent bottom touching and under-ke.", "o": {"A": "static under-keel clearance and dynamic under-keel clearance", "B": "under-keel clearance to prevent bottom touching and under-keel clearance to reduce maneuvering difficulty", "C": "depth measurement error allowance and vessel motion allowance", "D": "under-keel clearance and wave-induced allowance"}, "a": "B"}, {"u": 5, "q": "During navigation, the first category of under-keel clearance (to prevent bottom touching) mainly includes which two aspects? depth measurement errors and underwater obstacles, and incre.", "o": {"A": "depth measurement errors and underwater obstacles, and increase in vessel draft due to motion", "B": "vessel squat and wave-induced heave", "C": "ensuring vessel maneuverability and protecting main engine condenser water intakes", "D": "dredging advance for sedimentation and additional draft due to vessel heel"}, "a": "A"}, {"u": 5, "q": "In the design code, when no tug assistance and no bow/stern thrusters are available, the turning circle diameter is taken as (2.0–3.0)L rather than a single fixed value. The fundamental reason is: This range actually accounts for different shelter condition.", "o": {"A": "Different ports have different design vessel drafts; the greater the draft, the larger the turning circle diameter.", "B": "This range actually accounts for different shelter conditions; the better the shelter conditions, the lower the value that may be adopted, and the worse the shelter conditions, the higher the value that should be adopted.", "C": "Different ports have different approach channel widths; the wider the channel, the smaller the turning circle diameter can be.", "D": "Different vessels have different speeds; the higher the speed, the larger the turning circle diameter."}, "a": "B"}, {"u": 5, "q": "In the port service level indicator AWT/AST, the meaning of AWT is: Average vessel waiting time, including waiting time for the.", "o": {"A": "Average vessel time at berth for loading/unloading operations", "B": "Average vessel waiting time, including waiting time for the approach channel and waiting time for a berth", "C": "Average vessel auxiliary service time, including mooring, quarantine, etc.", "D": "Average total vessel turnaround time in port"}, "a": "B"}, {"u": 5, "q": "According to the General Design Code for Sea Ports (JTS 165-2025), which of the following statements regarding single-point and multi-point mooring terminals is correct? Its main advantages include small works volume, low construc.", "o": {"A": "This type of terminal features high construction cost and long construction period, and is suitable for well-funded port projects", "B": "It is suitable for constructing large bulk cargo terminals in areas with sufficient nearshore water depth and favorable conditions for channel excavation", "C": "Its main advantages include small works volume, low construction cost, and short construction period; disadvantages include poor operating conditions and inconvenient personnel access", "D": "China already has practical engineering application cases of this type of terminal, with satisfactory application results"}, "a": "C"}, {"u": 5, "q": "Regarding the reference water level for determining the seabed elevation at the LNG (Liquefied Natural Gas) terminal quay apron, which of the following statements is correct? It shall be referenced from the local lowest theoretical tid.", "o": {"A": "It shall be referenced from the mean tide level, ensuring that the design vessel can safely berth under fully loaded draft conditions", "B": "It shall be referenced from the tidal level with 90% cumulative frequency of low water, ensuring that the design vessel can safely berth under fully loaded draft conditions", "C": "It shall be referenced from the tidal window level, since large vessels utilize high tide for port entry and departure", "D": "It shall be referenced from the local lowest theoretical tide level, to ensure sufficient water depth at the quay apron under any tidal conditions"}, "a": "D"}, {"u": 5, "q": "The 'navigable clearance height' of structures crossing a navigation channel (such as bridges, cables, etc.) refers to the vertical distance between the lowest point of the structure within the navigation opening and ( ). the design highest navigable water level.", "o": {"A": "the design lowest navigable water level", "B": "the design highest navigable water level", "C": "mean sea level", "D": "chart datum"}, "a": "B"}, {"u": 5, "q": "Without bow thrusters and without tug assistance, the vessel turning circle diameter shall be taken as: (2.0~3.0)L.", "o": {"A": "1.5L", "B": "2.0L", "C": "(2.0~3.0)L", "D": "3.5L"}, "a": "C"}, {"u": 5, "q": "Both buoys and leading marks are navigation aids that guide vessels safely, but they differ in their guidance methods and applicable scenarios. Which of the following statements is correct? Buoys are deployed continuously along channel boundaries, ma.", "o": {"A": "Buoys guide vessels using the visual line formed by the alignment of front and rear marks, and are mostly used in wide waters; leading marks float on the water surface to mark boundaries, and are mostly used in narrow channels.", "B": "Buoys are deployed continuously along channel boundaries, marking the outer contour of the navigable water area, and are suitable for wide waters utilizing natural water depth; leading marks are installed in pairs onshore, providing vessels with precise route guidance through the alignment of front and rear marks, and are suitable for narrow and hazardous channels and port entrances.", "C": "The spacing of leading marks is related to water depth — the greater the depth, the larger the allowable spacing; the elevation difference between front and rear buoys determines guidance accuracy.", "D": "Both buoys and leading marks must be used in pairs to be effective; a single mark has no guidance function whatsoever."}, "a": "B"}, {"u": 5, "q": "Navigation aids (aids to navigation) are the collective term for port guidance and navigation assistance facilities, including buoys, leading marks, lighthouses, and other types. Regarding the functions and placement locations of navigation aids, which of the following statements is correct? Buoys float on the water surface and are anchored in place.", "o": {"A": "Buoys float on the water surface and are anchored in place, primarily used to mark channel boundaries and hazards; leading marks are installed in pairs onshore along the extended line of the channel centerline or entrance centerline, used to guide vessels through narrow or winding channels and entrances; lighthouses are built on prominent coastal headlands, islands, or reefs, used for guiding vessels approaching the port from a distance and fixing vessel positions.", "B": "Both buoys and leading marks are installed on the water surface, differing only in that buoys drift with currents while leading marks are fixed; lighthouses can only be built on isolated islands in the sea.", "C": "Lighthouses are used for guiding vessels through entrances at close range, while leading marks are used for indicating port positions from a distance; the two functions are interchangeable.", "D": "Buoys, leading marks, and lighthouses serve the same function of marking channel boundaries; their placement locations can be arbitrarily chosen with no material impact on port operations."}, "a": "A"}, {"u": 5, "q": "In the calculation of effective channel width, the design standard accounts for the bank effect through the vessel-bank clearance c. Regarding the determination of c, which of the following statements is correct? The bank effect is influenced by factors such as the distanc.", "o": {"A": "In the standard, the value of c depends on vessel speed, vessel type, and vessel beam, because the bank effect is only related to these three factors.", "B": "The bank effect is influenced by factors such as the distance between the vessel and the bank slope, the water depth-to-draft ratio, the ratio of bank slope height to channel water depth, vessel maneuverability, vessel speed, wind and current, and bank slope material; however, from a practical standpoint, the standard determines c based only on vessel speed, vessel type, and vessel beam.", "C": "In the standard, the value of c depends on vessel speed and vessel type, because the bank effect is only related to these two factors.", "D": "The bank effect is influenced by factors such as the distance between the vessel and the bank slope, the water depth-to-draft ratio, the ratio of bank slope height to channel water depth, vessel maneuverability, vessel speed, wind and current, and bank slope material; however, from a practical standpoint, the standard determines c based only on vessel speed and vessel type."}, "a": "B"}, {"u": 5, "q": "Regarding the selection between one-way and two-way channels, which of the following statements is correct? When vessels carrying hazardous chemicals are transiting, a.", "o": {"A": "A two-way channel is superior to a one-way channel under all conditions.", "B": "When vessels carrying hazardous chemicals are transiting, a two-way channel must be downgraded to one-way traffic.", "C": "A one-way channel has no requirement for following time intervals between vessels.", "D": "The higher the channel class, the greater the dependence on tidal water levels."}, "a": "B"}, {"u": 5, "q": "For a newly built port planning to determine the dimensions of the turning basin, which of the following approaches complies with code principles? Preliminarily determine based on code-recommended values, an.", "o": {"A": "Directly adopt the code tabulated values without considering the specific local conditions of wind, waves, currents, and shelter.", "B": "Physical model test results must be the sole design basis; code-recommended values serve only as a preliminary reference.", "C": "Preliminarily determine based on code-recommended values, and when conditions are complex, further validate through numerical simulation or ship maneuvering trials.", "D": "Must be based on full-scale vessel observation data from existing ports of the same tonnage class; code tabulated values serve only as verification reference."}, "a": "C"}, {"u": 5, "q": "For a dry bulk terminal where the quay apron water depth is referenced from the design low water level, there remains approximately ( ) probability of tidal levels falling below this level. Among the following measures, which is the coping approach that the terminal design should NOT rely upon? Approximately 2%; further dredge the terminal seabed elevati.", "o": {"A": "Approximately 2%; when forecast tidal levels are below the design low water level, the scheduling department restricts fully loaded large vessels from berthing during that time window", "B": "Approximately 5%; for vessels already berthed, loading operations can be suspended during low tide and resumed once the tidal level rises again", "C": "Approximately 2%; further dredge the terminal seabed elevation down to the lowest theoretical tide level to ensure vessel safety after berthing", "D": "Approximately 5%; through provision of additional depth margin during terminal design, an extra water depth buffer is provided when water levels fall below the design low water level"}, "a": "C"}, {"u": 5, "q": "In the calculation of water depth at the quay apron, the value of the minimum under-keel clearance $Z_1$ is primarily determined by which of the following factors? Seabed material type at the quay.", "o": {"A": "Seabed material type at the quay", "B": "Measurement errors in water depth and observed tidal levels", "C": "Deadweight tonnage (DWT) of the design vessel", "D": "Requirements for preventing sediment blockage at the main engine condenser intake"}, "a": "A"}, {"u": 5, "q": "Regarding the port service level key indicator AWT/AST, which of the following statements about the definition of AST is correct? It refers to the vessel loading/unloading operation time, ex.", "o": {"A": "It refers to the total time from vessel arrival at the port to vessel departure from the port", "B": "It refers to the vessel loading/unloading operation time, excluding auxiliary service time such as mooring and quarantine", "C": "It refers to all time at berth after the vessel is berthed, including both loading/unloading and auxiliary service time", "D": "It refers to the time from weighing anchor at the anchorage to completing berthing"}, "a": "B"}, {"u": 5, "q": "For an open sea port quay without harbor tug assistance, where vessels have no bow/stern thrusters and the tidal current velocity in the port area is relatively high, which of the following design schemes for the turning basin is the most reasonable? Select a value toward the upper end of the (2.0–3.0)L range.", "o": {"A": "Adopt a turning circle diameter of 2.0L with a circular basin, simply corresponding to the code tabulated values.", "B": "Adopt a turning circle diameter of 2.5L with a circular basin, selecting the value for the poorer shelter category.", "C": "Select a value toward the upper end of the (2.0–3.0)L range, appropriately elongate the basin along the current direction, and adopt an elliptical turning basin.", "D": "Adopt a turning circle diameter of 1.5L, using mooring dolphins to assist vessel turning."}, "a": "C"}, {"u": 5, "q": "When port throughput grows rapidly and the number of arriving vessels far exceeds the original design value, if monitoring reveals that the AWT/AST indicator has deteriorated significantly while the berth utilization rate has not risen notably in tandem, the direct cause of the deterioration in port service level is: The approach channel capacity has become the system bottlene.", "o": {"A": "Insufficient yard capacity, impeding cargo turnover", "B": "Aging handling equipment, declining per-unit efficiency", "C": "The approach channel capacity has become the system bottleneck, with vessel waiting time for the channel increasing rapidly", "D": "Excessive number of berths, leading to idle resources and waste"}, "a": "C"}, {"u": 5, "q": "When a bend section is required in the channel alignment, which of the following measures is NOT a requirement stipulated by the design standard? The channel depth in the bend section must be deepened by 0.", "o": {"A": "Minimize the deflection angle as much as possible to reduce navigational difficulty.", "B": "Lengthen the straight section spacing before and after the bend to provide adjustment room for vessels.", "C": "Appropriately increase the turning radius of the bend section to meet vessel turning maneuver requirements.", "D": "The channel depth in the bend section must be deepened by 0.5–1.0 m compared to the straight section to compensate for ship squat during turning."}, "a": "D"}, {"u": 5, "q": "The drift angle γ due to wind and current refers to: the angle between the vessel's fore-and-aft line and the cha.", "o": {"A": "the angle between wind direction and current direction", "B": "the vessel's lateral drift angle", "C": "the angle between the channel axis and the predominant current direction and dominant wave direction", "D": "the angle between the vessel's fore-and-aft line and the channel centerline"}, "a": "D"}, {"u": 5, "q": "Among the following factors affecting channel transit capacity, which one is a management-optimization-type factor with potential for improvement? vessel following interval control rules for transit.", "o": {"A": "channel water depth", "B": "channel width", "C": "vessel following interval control rules for transit", "D": "maximum vessel dimensions for transit"}, "a": "C"}, {"u": 5, "q": "Regarding the determination of the minimum under-keel clearance Z₁ in quay apron design water depth and channel design water depth, which of the following statements is correct? Z₁ at the quay apron considers seabed material type; Z₁ in t.", "o": {"A": "Z₁ at the quay apron considers seabed material type; Z₁ in the channel considers both seabed material type and vessel tonnage. For muddy/silty seabeds, due to survey difficulties and poor elevation accuracy, Z₁ should take a larger value.", "B": "Z₁ at the quay apron considers both seabed material type and vessel tonnage; Z₁ in the channel also considers both seabed material type and vessel tonnage. For muddy/silty seabeds, due to survey difficulties and poor elevation accuracy, Z₁ should take a larger value.", "C": "Z₁ at the quay apron considers seabed material type; Z₁ in the channel considers both seabed material type and vessel tonnage. For rocky soil, due to the severe consequences of bottom touching, Z₁ should take a larger value.", "D": "Z₁ at the quay apron considers both seabed material type and vessel tonnage; Z₁ in the channel also considers both seabed material type and vessel tonnage. For rocky soil, due to the severe consequences of bottom touching, Z₁ should take a larger value."}, "a": "C"}, {"u": 5, "q": "In the design calculation of channel navigable depth, which of the following statements about vessel squat Z₀ is correct? Z₀ is the vessel sinkage caused by accelerated flow and redu.", "o": {"A": "Z₀ is the vessel sinkage caused by accelerated flow and reduced water pressure along the hull sides during navigation; factors affecting its magnitude include channel water depth, cross-section, vessel speed, hull form, and passing (overtaking/meeting) conditions.", "B": "Z₀ is the bow and stern sinkage caused by the superposition of pitch, roll, and heave induced by wave action during navigation; its magnitude depends on wave height, wave period, wave direction, and vessel tonnage and speed.", "C": "As vessel squat, Z₀ depends solely on vessel speed and is unrelated to channel water depth and cross-sectional area; therefore, at the same speed, Z₀ takes the same value in both deep-water and shallow-water channels.", "D": "The code-based calculation method for Z₀ is universally applicable; regardless of whether the channel side slopes are high or low or whether they are exposed above water, the code formula can be directly applied without distinguishing differences in channel cross-sectional morphology."}, "a": "A"}, {"u": 5, "q": "When designing the access channel for a bulk carrier terminal handling 80,000 DWT vessels (draft 14.5m) on a coast with a relatively large tidal range (6m), the port authority considers making use of tidal windows to reduce dredging costs. What is the primary determinant in deciding whether tidal window design is acceptable? Relatively low annual throughput, making vessel waiting cost.", "o": {"A": "Presence of breakwaters reducing wave impact during tidal windows", "B": "Availability of emergency anchorage near the port entrance", "C": "Seabed geology allowing inexpensive future dredging", "D": "Relatively low annual throughput, making vessel waiting costs economically acceptable"}, "a": "D"}, {"u": 5, "q": "Which of the following statements about the impact of waves on berthing is correct? Problems related to long period waves are generally much mor.", "o": {"A": "We should keep the ship in beam sea conditions as possible as we can to reduce its pitch and heave motions.", "B": "For ports handling ships of various sizes, the allowable wave heightights are the same.", "C": "Problems related to long period waves are generally much more challenging to handle than those related to short period waves.", "D": "Since waves are primarily generated outside the port, it is only necessary to assess wave penetration through the entrance."}, "a": "C"}, {"u": 5, "q": "Regarding anchorage water depth design, which of the following statements is correct? Anchorage water depth is generally not less than 1.2 times t.", "o": {"A": "Anchorage water depth depends on the vessel's fully loaded draft; to ensure anchoring safety, sea harbor anchorages must be artificially dredged.", "B": "Anchorage water depth must satisfy the vessel's light draft; when the design wave height exceeds 1 m, additional wave effects must be considered.", "C": "Anchorage water depth is generally not less than 1.2 times the vessel's fully loaded draft; when the design wave height exceeds 2 m, an additional wave allowance depth must be included.", "D": "The design standard for anchorage water depth is the same as that for berth water depth."}, "a": "C"}, {"u": 5, "q": "In the calculation of design water depth at a well-sheltered quay apron, which of the following statements regarding the wave-induced additional depth $Z_2$ is correct? According to Chinese codes, it is calculated using KH₄% − Z₁.", "o": {"A": "According to Chinese codes, it is calculated using KH₄%, where K is determined by the ship-to-wave angle; therefore the squat amount is unrelated to wave period, vessel tonnage, water depth, and mooring conditions", "B": "According to Chinese codes, it is calculated using KH₄% − Z₁, where K is determined by the ship-to-wave angle; therefore the squat amount is unrelated to wave period, vessel tonnage, water depth, and mooring conditions", "C": "According to Chinese codes, it is calculated using KH₄%, where K is determined by the ship-to-wave angle; however, the actual squat amount is also related to wave period, vessel tonnage, water depth, and mooring conditions", "D": "According to Chinese codes, it is calculated using KH₄% − Z₁, where K is determined by the ship-to-wave angle; however, the actual squat amount is also related to wave period, vessel tonnage, water depth, and mooring conditions"}, "a": "D"}, {"u": 5, "q": "At the feasibility study or conceptual scheme stage, when natural condition data are insufficient, which of the following statements about the estimation formula and parameter selection rules for design water depth at the quay apron is correct? $D=kT$, where the coefficient $k$ is selected according to p.", "o": {"A": "$D=kT$, where the coefficient $k$ is selected according to port shelter conditions, with smaller values for sheltered terminals and larger values for open-sea terminals", "B": "$D=kT$, where the coefficient $k$ is a universal constant unaffected by port shelter conditions and takes the same value for all terminals", "C": "$D=T+kZ_1$, where $k$ is a comprehensive additional depth constant selected according to port shelter conditions, with smaller values for sheltered terminals and larger values for open-sea terminals, and $Z_1$ is determined by seabed geology", "D": "$D=T+kZ_1$, where $k$ is a multiplying factor, and $Z_1$ is the minimum under-keel clearance determined by consulting tables according to seabed material and vessel tonnage respectively"}, "a": "A"}, {"u": 5, "q": "When a port area is significantly affected by currents, how should the design of the turning basin be addressed? The turning basin should be appropriately elongated along th.", "o": {"A": "The dimensions of the turning basin remain unchanged; only the relative position between the turning basin and the quay needs to be adjusted.", "B": "The turning basin should be appropriately elongated along the current direction; in the absence of experimental data, the length along the current direction may be taken as (2.5–3.0)L.", "C": "Only the water depth of the turning basin needs to be increased; the horizontal dimensions are not affected by currents.", "D": "When affected by currents, a square turning basin should be used instead of a circular one."}, "a": "B"}, {"u": 5, "q": "A gravity-type quay wall adopts a rubble-mound foundation bed. Measured results show that the outer edge of the rubble-mound foundation extends 0.8 m beyond the front face of the quay fender. In calculating the water depth at the quay apron, the value of $Z_1$ should be considered on the basis of which of the following seabed materials? Rocky soil.", "o": {"A": "Silty soil", "B": "Loose sandy soil", "C": "Rocky soil", "D": "Blocky clay"}, "a": "C"}, {"u": 5, "q": "Regarding the reference water level for determining the seabed elevation at the container terminal quay apron, which of the following statements is correct? It shall be referenced from the tidal level with 90% cumulat.", "o": {"A": "It shall be referenced from the mean tide level, ensuring that the design vessel can safely berth under fully loaded draft conditions", "B": "It shall be referenced from the tidal level with 90% cumulative frequency of low water, ensuring that the design vessel can safely berth under fully loaded draft conditions", "C": "It shall be referenced from the tidal window level, since large vessels utilize high tide for port entry and departure", "D": "It shall be referenced from the local lowest theoretical tide level, to ensure sufficient water depth at the quay apron under any tidal conditions"}, "a": "B"}, {"u": 5, "q": "For a crude oil importing terminal in a silty coast with 15 m natural depth but high sediment mobility, which layout minimizes dredging costs while accommodating VLCC tankers? Detached jetty utilizing natural depth.", "o": {"A": "Alongshore reclaimed quay", "B": "Pier-type with sediment-resisting dykes", "C": "Detached jetty utilizing natural depth", "D": "Dredged basin with containment dykes"}, "a": "C"}, {"u": 5, "q": "When designing breakwater alignment for a container terminal, which configuration would severely worsen wave conditions inside the harbor? Let breakwater alignment parallel to prevailing wave directi.", "o": {"A": "Let breakwater alignment perpendicular to prevailing wave direction", "B": "Let breakwater alignment parallel to prevailing wave direction", "C": "Use a curved breakwater alignment to create partial diffraction zones", "D": "Use a detached breakwater to induce wave refraction"}, "a": "B"}, {"u": 5, "q": "According to Table 6.4.2-2 of the design standard, channel alignment should avoid unfavorable sections where the cross-current exceeds 1.00 m/s. Regarding the approach when such avoidance is not feasible, which of the following statements is correct? When the cross-current is between 1.00 and 1.50 m/s, adopt t.", "o": {"A": "Take the cross-current value as per the 0.75–1.00 m/s bracket for calculation, then multiply the result by a safety factor.", "B": "Uniformly adopt the 1.00–1.25 m/s bracket for calculation, and conduct a specialized study or ship maneuvering verification.", "C": "When the cross-current is between 1.00 and 1.50 m/s, adopt the parameters from the corresponding bracket in the table for calculation, and conduct a specialized study or ship maneuvering verification.", "D": "Simply increase the number of tugboats or upgrade the tugboat class; no adjustment of channel dimension parameters is required."}, "a": "C"}, {"u": 5, "q": "According to Table 6.4.2-2 of the design standard, the value of the drift angle γ is directly determined by: crosswind scale and cross-current velocity.", "o": {"A": "vessel length and beam", "B": "crosswind scale and cross-current velocity", "C": "vessel tonnage class and full-load draft", "D": "wave period and wave height"}, "a": "B"}, {"u": 5, "q": "When designing the depth of an access channel for 200,000 DWT bulk carriers (design draft T=18.0m), which statements accurately describe the components in the formula D = T + Z₀ + Z₁ + Z₂ + Z₃ + Z₄ per standards? Z₀ (ship squat) is influenced by DWT and vessel speed.", "o": {"A": "Z₀ (ship squat) is influenced by DWT and vessel speed.", "B": "Z₁ (under-keel clearance) is reduced by 0.3m in rocky seabeds compared to muddy bottoms", "C": "Z₂ (wave increment) uses significant wave height (Hs) with 10% exceedance probability for channel transit", "D": "Total depth D includes tidal variation, hence Z₃ can be omitted in tidal channels"}, "a": "A"}, {"u": 5, "q": "Which statement accurately describes factors related to Under Keel Clearance (UKC)? Decreasing UKC reduces maneuverability for bulk carriers.", "o": {"A": "UKC requirements apply during vessel navigation and could be ignored at berth since the vessel at berth is statistic.", "B": "Decreasing UKC reduces maneuverability for bulk carriers.", "C": "Due to smaller measurement errors in rocky seabeds compared to silt bottoms, UKC for rocky seabeds may be reduced.", "D": "Because dropping anchor occurs only in designated anchoring areas, channel design should not account for anchor impact to avoid unnecessary construction costs."}, "a": "B"}, {"u": 5, "q": "Compared with the rules for determining Z₁ in quay apron water depth calculation, the key factor additionally considered in Z₁ for channel water depth calculation is: vessel deadweight tonnage (DWT)", "o": {"A": "seabed material type", "B": "vessel deadweight tonnage (DWT)", "C": "requirement to prevent clogging of condenser water intakes", "D": "risk of contact with underwater obstacles"}, "a": "B"}, {"u": 5, "q": "The width of a vessel's swept track is primarily influenced by which of the following factors? Both the beam and length of the vessel, as well as the drift.", "o": {"A": "The beam of the vessel only.", "B": "The beam of the vessel and the drift angle caused by wind and current.", "C": "The length of the vessel and the drift angle caused by wind and current.", "D": "Both the beam and length of the vessel, as well as the drift angle caused by wind and current."}, "a": "D"}, {"u": 5, "q": "In the swept track width formula A = n(Lsinγ + B), the term Lsinγ represents: the transverse projected length of the vessel hull due to th.", "o": {"A": "the longitudinal projected length of the vessel in the channel", "B": "the transverse projected length of the vessel hull due to the drift angle caused by wind and current", "C": "the transverse distance swept by the vessel stern during turning", "D": "the maximum distance the vessel bow deviates from the centerline during braking"}, "a": "B"}, {"u": 5, "q": "When orienting breakwaters and approach channels to minimize wave disturbance inside a harbor, what is the most critical factor for ensuring berthing tranquility and operational safety? Blocking dominant wave energy directions while allowing vess.", "o": {"A": "Blocking dominant wave energy directions while allowing vessel access", "B": "Minimizing wave heights at the harbor entrance using reflective barrier walls", "C": "Aligning breakwaters perpendicular to the dominant sediment transport direction", "D": "Maximizing water depth near quay walls to reduce wave shoaling effects"}, "a": "A"}, {"u": 5, "q": "When constructing ports on sandy coasts versus muddy coasts, there are fundamental differences in the logic for selecting breakwater entrance locations. Which of the following statements is correct? Muddy coasts have gentle underwater slopes, and the wave bre.", "o": {"A": "Sediment on sandy coasts is predominantly suspended load; the entrance should be located within the wave surf zone, using breaking wave agitation to keep sediment in suspension and prevent deposition at the entrance.", "B": "Muddy coasts have gentle underwater slopes, and the wave breaking point is often far from shore; locating the entrance outside the wave surf zone can significantly reduce siltation, but excessive breakwater length leads to high investment costs, requiring a balance between siltation volume and construction cost.", "C": "On sandy coasts, sediment mainly enters the harbor in suspension with tidal currents, and the entrance should avoid areas of high sediment concentration; on muddy coasts, longshore sediment transport dominates, and the entrance should be located within the wave surf zone.", "D": "Silty coast sediment particle size lies between sandy and muddy, so siltation characteristics are also intermediate; the entrance location selection method is identical to that for sandy coasts and requires no special consideration."}, "a": "B"}, {"u": 5, "q": "Regarding the layout configuration of breakwater entrances, which of the following statements is correct? If vessel access is convenient and coastal sediment movement.", "o": {"A": "A frontal entrance provides better sheltering conditions than a lateral entrance, so when site conditions permit, a frontal entrance should be preferentially adopted.", "B": "A lateral entrance can prevent dominant waves from directly striking the berths and improve harbor berthing tranquility, but it limits the flexibility of berth layout; therefore it is only adopted when coastal sediment movement is intense.", "C": "If vessel access is convenient and coastal sediment movement is mild, a lateral entrance should be preferentially adopted. If a frontal entrance is used, because of its poorer sheltering conditions, the entrance orientation must avoid the dominant wave direction.", "D": "The choice between frontal and lateral entrances depends solely on channel orientation and has nothing to do with wave conditions or sediment movement."}, "a": "C"}, {"u": 5, "q": "Regarding the selection of breakwater entrance location, which of the following statements is correct? The entrance should be located at the seaward-most protrudin.", "o": {"A": "The entrance should be located at the seaward-most protruding point of the breakwater where water depth is greatest, and be coordinated with the approach channel; it should also be located beyond the critical depth of sediment movement to reduce channel siltation.", "B": "The entrance should be located within the wave surf zone, utilizing the energy dissipation of breaking waves to improve harbor berthing tranquility.", "C": "The deeper the entrance water depth the better; therefore the deepest water area near the port site should be preferentially selected, with channel coordination being a secondary factor.", "D": "The entrance location has little influence on channel siltation, as the amount of siltation depends primarily on port throughput."}, "a": "A"}, {"u": 5, "q": "Regarding navigational safety conditions for vessels entering the harbor entrance, which of the following statements is correct? The entrance orientation should avoid crosswinds exceeding B.", "o": {"A": "As long as the angle between the approach course and the dominant wave direction does not exceed 60°, vessel safety when entering the entrance can be ensured.", "B": "The entrance orientation should avoid crosswinds exceeding Beaufort force 7 and cross-currents exceeding 0.8 kn; the angle between the approach course and the dominant wave direction should not exceed 30°–35°; a straight navigable water area of no less than 4 times the vessel length and a turning basin must be provided between the entrance and the berths.", "C": "The safe speed for vessels entering the entrance is 2–3 kn; therefore, a straight water area of only 2 times the vessel length between the entrance and the berths is sufficient to meet braking requirements.", "D": "Cross-current conditions at the entrance have little effect on large vessels; controlling the cross-current velocity below 2 kn can satisfy the safe maneuvering requirements for all vessel types."}, "a": "B"}, {"u": 5, "q": "The angle between the breakwater axis and the dominant wave direction, and the overtopping criterion for crest elevation, are two interrelated core decisions in breakwater design. Which of the following statements is correct? An angle of 60°–80° between the breakwater axis and the domi.", "o": {"A": "The breakwater axis should be as orthogonal as possible to the dominant wave direction to maximize wave energy dissipation; meanwhile, to reduce costs, uniformly adopting the allowable overtopping criterion (0.6 times the design wave height) can satisfy all berthing tranquility requirements.", "B": "An angle of 60°–80° between the breakwater axis and the dominant wave direction is recommended, avoiding wave force concentration at orthogonal alignment. For crest elevation, the essentially no-overtopping criterion adopts approximately 1.0 times the design wave height while the allowable overtopping criterion adopts approximately 0.6 times. The former results in a higher crest, better sheltering but higher cost, and must be selected based on harbor berthing tranquility requirements.", "C": "The axis angle and crest elevation are independent of each other; the former is determined by wave direction and the latter by tidal conditions, with no cross influence in design.", "D": "The smaller the axis angle, the smaller the wave force per unit length on the breakwater; therefore the angle should be below 30° to reduce structural loading. Crest elevation values are the same under both the allowable overtopping and essentially no-overtopping criteria, with the only difference being whether a wave wall (crown wall) is installed."}, "a": "B"}, {"u": 5, "q": "In engineering practice, regarding the determination method and key parameters for establishing nautical depth in muddy ports, which of the following statements is correct? Nautical depth can be determined by the mud rheological prop.", "o": {"A": "Nautical depth is determined by trial dredging, taking the depth that the dredger grab can reach as the nautical depth interface.", "B": "Nautical depth can be determined by the mud rheological property method or the ship model resistance test method; in practice, fluid mud density is commonly used as the criterion.", "C": "Nautical depth is determined by high-frequency acoustic sweep surveying of the hard mud surface; in practice, it is judged by the safety criterion that the vessel does not contact the hard mud surface.", "D": "Nautical depth is determined by high-frequency acoustic sweep surveying of the fluid mud surface; in practice, it is judged by the safety criterion that the vessel does not contact the fluid mud surface."}, "a": "B"}, {"u": 5, "q": "Regarding the design requirements for the width of the water area in front of a quay (harbor basin), which of the following statements is correct? When the turning basin is located within the harbor basin, t.", "o": {"A": "The harbor basin width is uniformly controlled at ≥0.8L, which already encompasses all the spatial requirements for both the turning basin and the berthing area.", "B": "When the turning basin is located within the harbor basin, the basin width shall not be less than 1.5L + 1.0B; when vessels can turn in other water areas outside the harbor basin, the basin width may be reduced to not less than 0.8L.", "C": "The harbor basin width depends only on the design vessel beam B and is independent of the vessel length", "D": "The harbor basin width should be taken as the larger of 1.5L and 1.0B as the design control value."}, "a": "B"}, {"u": 5, "q": "Regarding the water area marked by double-headed arrows in the figure below, which statement is correct? It refers to the water area in front of a quay, also known a.", "o": {"A": "It refers to the berthing area at the quay apron; the difference between Figures a and b lies in whether the approach channel is immediately adjacent to the quay apron.", "B": "It refers to the water area in front of a quay, also known as the harbor basin; the difference between Figures a and b lies in whether vessel turning is conducted within the water area in front of the quay.", "C": "Figure a refers to the minimum distance between the quay and the breakwater; Figure b refers to the minimum distance between piers of a finger pier terminal.", "D": "The water depth within this area should be uniform to facilitate vessel berthing and unberthing."}, "a": "B"}, {"u": 5, "q": "When a turning basin is affected by currents, it is elongated along the current direction rather than expanded proportionally in all directions. The physical reason is: During the turning maneuver, the vessel hull is pushed and d.", "o": {"A": "Currents increase vessel speed, requiring a longer braking distance to stop the vessel.", "B": "During the turning maneuver, the vessel hull is pushed and drifts along the current direction, so the actual turning trajectory is stretched into an ellipse with its major axis aligned with the current direction.", "C": "Current scour lowers the seabed elevation, requiring a larger basin area to compensate for insufficient water depth.", "D": "The cross-current direction is protected by the bank effect and needs no widening; only the current direction requires compensation."}, "a": "B"}, {"u": 5, "q": "In the calculation of channel design depth, which of the following statements regarding the wave-induced additional depth Z₂ is correct? According to Chinese codes, it is calculated using KH₄%, whe.", "o": {"A": "According to Chinese codes, it is calculated using KH₄%, where K is determined by the ship-to-wave angle; therefore the squat amount is unrelated to wave period, vessel tonnage, and water depth", "B": "According to Chinese codes, it is calculated using KH₄% − Z₁, where K is determined by the ship-to-wave angle; therefore the squat amount is unrelated to wave period, vessel tonnage, and water depth", "C": "According to Chinese codes, it is calculated using KH₄%, where K is determined by both the ship-to-wave angle and the wave period; however, the actual squat amount is also related to vessel tonnage and water depth", "D": "According to Chinese codes, it is calculated using KH₄% − Z₁, where K is determined by the ship-to-wave angle; however, the actual squat amount is also related to wave period, vessel tonnage, and water depth"}, "a": "C"}, {"u": 5, "q": "Design codes require minimizing the angle between the prevailing directions of strong winds, heavy waves, and currents and the channel axis. However, in actual engineering practice, the angle between the channel axis and the current direction is sometimes relatively large. This indicates that: Optimizing current conditions is a goal to be pursued where.", "o": {"A": "The requirement to reduce the crossing angle is a recommendatory provision and may be completely disregarded.", "B": "Optimizing current conditions is a goal to be pursued where possible; when factors such as back-siltation, channel length, and full life-cycle costs are more prominent, the adverse effects of the crossing angle can be compensated through supplementary measures on the premise of demonstrated navigation safety.", "C": "The current crossing angle only affects the navigation of small vessels and has no impact on large vessels.", "D": "The requirement to reduce the crossing angle applies only to open coastal channels; channels with good shelter conditions do not need to consider it."}, "a": "B"}, {"u": 5, "q": "The function of the vessel drift multiplier n in the swept track formula A = n(Lsinγ + B) is to: amplify the geometric projected width to the lateral oscilla.", "o": {"A": "compensate for depth errors caused by different seabed material hardness in the channel", "B": "amplify the geometric projected width to the lateral oscillation amplitude of the actual sailing track", "C": "calculate the vessel's displacement per unit time in cross-current conditions", "D": "determine the maximum allowable speed multiple for vessels in the channel"}, "a": "B"}, {"u": 5, "q": "When constructing a port on a muddy/silty coast, regarding the relationship between the harbor basin area enclosed by breakwaters and sediment deposition, which of the following statements is correct? The larger the harbor basin area, the larger the tidal prism.", "o": {"A": "The larger the harbor basin area, the larger the tidal prism, the higher the flow velocity, and the smaller the total sedimentation volume.", "B": "The larger the harbor basin area, the larger the tidal prism, and the greater the total amount of suspended sediment deposition.", "C": "The total sedimentation volume is related to the offshore sediment concentration and is independent of the harbor basin area.", "D": "To minimize sedimentation in the harbor, the harbor basin area should be maximized so that sediment can be scoured away by the tidal prism."}, "a": "B"}, {"u": 5, "q": "Regarding the principle of the bank effect in navigation channels, which of the following statements is correct? The bank effect is the phenomenon where the flow cross-secti.", "o": {"A": "The bank effect is the phenomenon where the vessel bow is pushed toward the channel center due to flow reflection when the vessel approaches a bank, and it is independent of vessel speed.", "B": "The bank effect is the phenomenon where the flow cross-section between the hull and the bank contracts, causing a decrease in flow velocity and an increase in pressure, which pushes the vessel toward the bank.", "C": "The bank effect is the phenomenon where the flow cross-section between the hull and the bank contracts, causing an increase in flow velocity and a decrease in pressure, which generates a lateral force pushing the vessel toward the bank.", "D": "The bank effect occurs only when the vessel navigates at high speed and can be ignored at low speed."}, "a": "C"}, {"u": 5, "q": "Under conditions of relatively good shelter, moderate currents, and with the assistance of harbor tugs, the vessel turning circle diameter may be taken as: (1.5~2.0)L.", "o": {"A": "(1.0~1.2)L", "B": "(1.5~2.0)L", "C": "(2.0~2.5)L", "D": "(2.5~3.0)L"}, "a": "B"}, {"u": 5, "q": "For a dry bulk terminal and an LNG terminal each determining their respective quay apron seabed elevations, which of the following most accurately describes their reference water levels and design philosophies? The dry bulk terminal is referenced from the design low wate.", "o": {"A": "Both are referenced from the design low water level (90% cumulative frequency of low water)", "B": "Both are referenced from the local lowest theoretical tide level, to ensure sufficient water depth at the quay apron under any low-tide conditions", "C": "The dry bulk terminal is referenced from the design low water level; the LNG terminal is not", "D": "The LNG terminal is referenced from the design low water level; the dry bulk terminal is not"}, "a": "C"}, {"u": 5, "q": "The wave propagation path inside a certain harbor is shown in the figure. What wave process inside the harbor does this reflect, and what type of structure should be used for section mn? Reflection; rubble-mound sloping revetment.", "o": {"A": "Reflection; rubble-mound sloping revetment", "B": "Diffraction; rubble-mound sloping revetment", "C": "Reflection; vertical caisson revetment", "D": "Diffraction; vertical caisson revetment"}, "a": "A"}, {"u": 5, "q": "Regarding the statement that \"the allowable wave heightight for vessel mooring at the berth front generally does not exceed 2 m,\" which of the following understandings is correct? When the wave height reaches 2 m and wind/wave/current condi.", "o": {"A": "This means that during cargo handling operations, the wave height at the berth front must not exceed 2 m", "B": "When the wave height reaches 2 m, all vessels must stop all operations", "C": "When the wave height reaches 2 m and wind/wave/current conditions show a worsening trend, the vessel should leave the port", "D": "2 m is a uniform standard for the allowable wave heightight for cargo handling at the berth front"}, "a": "C"}, {"u": 5, "q": "When a vessel can make use of mooring dolphins or turning dolphins on the quay to assist in turning, the turning circle diameter may be taken as: 1.5L.", "o": {"A": "1.2L", "B": "1.5L", "C": "2.0L", "D": "2.5L"}, "a": "B"}, {"u": 5, "q": "In the calculation of design water depth at the quay apron, which of the following statements regarding the wave-induced additional depth $Z_2$ is correct? It may generally be omitted in sheltered ports, but when lon.", "o": {"A": "$Z_2$ only needs to consider wave height and the ship-to-wave angle to satisfy engineering requirements", "B": "It may generally be omitted in sheltered ports, but when long-period waves occur inside the harbor, further determination through model tests may be necessary", "C": "$Z_2$ and $Z_1$ are conceptually independent, and the code stipulates that they shall be determined independently of each other", "D": "Vessel squat involves multiple factors including wave height, wave period, ship-to-wave angle, tonnage, and mooring conditions; when applying the code formula, these factors need to be calculated separately"}, "a": "B"}, {"u": 5, "q": "The key logic in determining the optimal number of berths is to balance which two categories of cost to minimize the total social cost? Port berth construction and operation cost + total vessel ti.", "o": {"A": "Port land acquisition cost + dredging works cost", "B": "Port berth construction and operation cost + total vessel time-in-port cost", "C": "Port cargo handling equipment cost + vessel waiting loss cost", "D": "Vessel fuel cost + hinterland collection and distribution cost"}, "a": "B"}, {"u": 5, "q": "The key system for achieving collaborative scheduling of multiple elements — approach channel, berth, yard, and horizontal transport — in a smart port is: Terminal Operating System (TOS)", "o": {"A": "Automatic Identification System (AIS)", "B": "Terminal Operating System (TOS)", "C": "Customs clearance management system", "D": "Meteorological and hydrological monitoring system"}, "a": "B"}, {"u": 5, "q": "In a smart port, which of the following is NOT a primary function of the TOS (Terminal Operating System)? Design and calculation of terminal hydraulic structures.", "o": {"A": "Vessel planning management and intelligent berth allocation", "B": "Intelligent yard slot planning and rehandling rate optimization", "C": "Design and calculation of terminal hydraulic structures", "D": "Real-time dispatching of quay cranes, yard cranes, and horizontal transport equipment"}, "a": "C"}, {"u": 5, "q": "Regarding the three anchoring methods — single anchor mooring, open moor (riding to two anchors with a splayed angle), and flying moor (stem-and-stern moor with two anchors in line) — which of the following statements is correct? Flying moor requires the smallest water area and is suitable.", "o": {"A": "Single anchor mooring provides the greatest holding power among the three methods and is most suitable for typhoon（", "B": "Compared to flying moor, open moor requires a larger water area but offers stronger resistance to yawing.", "C": "Flying moor requires the smallest water area and is suitable for narrow waterways; however, it provides limited holding power, the two chains are prone to entanglement after multiple changes in wind and current direction, and it is not recommended for use in typhoon（", "D": "Single anchor mooring involves complex operations and longer anchoring/weighing times, but experiences less yawing in heavy wind and waves; open moor is the easiest to operate, but is only suitable for shallow-water anchorages with depths less than 10"}, "a": "C"}, {"u": 5, "q": "The swept track width A represents: the width of water area occupied by the vessel as it swings.", "o": {"A": "the maximum transverse dimension of the vessel hull when navigating in still water", "B": "the width of water area occupied by the vessel as it swings left and right about the channel centerline due to the drift angle caused by wind and current and propeller-induced yaw", "C": "the result of multiplying the design vessel beam by a safety factor", "D": "the maximum transverse extent required for channel dredger operations"}, "a": "B"}, {"u": 5, "q": "When constructing a port on a muddy coast, there exists a complete causal chain between the harbor basin area enclosed by breakwaters and sediment deposition. Which of the following statements is correct? On muddy coasts, sediment enters the harbor in suspension; t.", "o": {"A": "On muddy coasts, sediment enters the harbor in suspension; the flow velocity inside the harbor decreases due to the sheltering effect of breakwaters, causing suspended sediment to deposit. Larger basin area → larger tidal prism → greater total influx of suspended sediment → more severe siltation. Therefore, non-essential water area should be minimized as much as possible while still meeting vessel operational requirements.", "B": "The amount of harbor sedimentation is only related to the entrance width and has nothing to do with the harbor basin area. As long as the entrance is sufficiently narrow, the tidal prism is naturally limited, and the harbor basin area can be expanded arbitrarily without affecting sedimentation.", "C": "The sedimentation mechanism in harbors on muddy coasts is the same as on sandy coasts — both originate from upstream longshore sediment transport bypassing the breakwater head. Therefore, breakwater length, not harbor basin area, is the sole factor determining the amount of sedimentation."}, "a": "A"}, {"u": 5, "q": "Regarding the water area dimensions required for anchoring, which of the following statements is correct? Under single anchor mooring, the anchorage water radius is r.", "o": {"A": "Anchorage water area dimensions are determined solely by the design vessel's length, independent of the anchoring method and environmental conditions.", "B": "Because the dual-anchor mooring method uses two anchors, it necessarily occupies a larger water area than single anchor mooring.", "C": "Under single anchor mooring, the anchorage water radius is related to the design vessel length, the horizontal projection length of the anchor chain, and the clearance distance; the horizontal projection length of the anchor chain is, in turn, influenced by water depth and seabed conditions. Compared to dual-anchor mooring, single anchor mooring generally requires a larger water area because the vessel can swing freely through 360° with wind and current.", "D": "Anchorage water area dimensions are directly and positively correlated with the port's annual throughput; that is, the greater the throughput, the larger the water area required for each anchorage."}, "a": "C"}, {"u": 5, "q": "For a shallow-draft port using a one-way channel where vessels must rely on tidal windows to enter the port, when the throughput increases by 50% above the design value, which waiting time will be the first to increase significantly? waiting time for channel access.", "o": {"A": "waiting time for channel access", "B": "waiting time for berth availability", "C": "waiting time for mooring and quarantine inspection", "D": "waiting time for yard operations"}, "a": "A"}, {"u": 5, "q": "Regarding the relative elevation relationship between the channel bottom and the quay apron bottom, which of the following statements is correct? Under all-tide navigation (with the lowest theoretical tide.", "o": {"A": "The channel bottom elevation is always lower than the quay apron bottom elevation, because the channel depth formula additionally includes the vessel squat Z₀, and the required channel depth is always greater than that at the quay apron under all circumstances.", "B": "Under all-tide navigation (with the lowest theoretical tide level as the datum) and conventional navigation (with the design low water level as the datum), the channel bottom elevation is usually lower than the quay apron bottom elevation; however, under tidal window navigation, since the tidal window water level is higher than the design low water level, the channel bottom elevation may instead be higher than the quay apron bottom elevation.", "C": "The quay apron bottom elevation is always lower than the channel bottom elevation, because the reference water level at the quay apron (design low water level) is fixed, whereas the channel can use tidal windows to raise the reference water level.", "D": "The relative elevation between the channel bottom and the quay apron bottom depends entirely on the design vessel draft"}, "a": "B"}, {"u": 5, "q": "As the angle Ψ between the wave direction and the vessel's longitudinal axis increases from 0° to 90°, the ratio of wave-induced vessel sinkage Z₂ to H₄% tends to: gradually increase.", "o": {"A": "remain constant", "B": "gradually decrease", "C": "gradually increase", "D": "first increase then decrease, reaching a maximum near 45°"}, "a": "C"}, {"u": 5, "q": "In channel design water depth, besides considering factors such as depth measurement errors, underwater obstacles, and increase in vessel draft during motion, the reason for providing a minimum under-keel clearance (Z₁) also includes: reducing vessel maneuvering difficulty in shallow water and.", "o": {"A": "compensating for wave-induced vertical vessel motions", "B": "reducing vessel maneuvering difficulty in shallow water and protecting main engine condenser water intakes", "C": "compensating for increased stern draft due to uneven loading", "D": "addressing sedimentation (back-siltation) of the channel"}, "a": "B"}, {"u": 5, "q": "When determining the breakwater entrance orientation, wind, wave, and current conditions must be comprehensively considered. Which of the following statements is correct? The entrance orientation should avoid the dominant wave dire.", "o": {"A": "The entrance should primarily face the prevailing wind direction to use wind to assist vessels in accelerating into the harbor; cross-current conditions can be overcome by increasing engine power and are not a constraining factor for entrance orientation.", "B": "The entrance orientation should avoid the dominant wave direction, with the angle between the approach course and the dominant wave direction not exceeding 30°–35°; crosswinds exceeding Beaufort force 7 and cross-currents exceeding 0.8 kn should also be avoided. If they cannot be completely avoided, the upwind-side breakwater outside the entrance can be extended to provide shelter for vessels.", "C": "The effect of cross-currents on large vessels depends mainly on the longitudinal flow velocity; therefore, only the longitudinal flow velocity at the entrance needs to be controlled below 2.5 kn, with no strict limit on cross-current velocity.", "D": "Avoiding the prevailing wave direction is the top priority for entrance orientation; dominant wave directions can be addressed through temporary port closures due to their low frequency and need not serve as a constraint on entrance layout."}, "a": "B"}, {"u": 5, "q": "Regarding the basic concept of nautical depth, which of the following statements is correct? Nautical depth refers to the vertical distance from the Lowe.", "o": {"A": "Nautical depth refers to the vertical distance from the Lowest Astronomical Tide (LAT) to the hard seabed surface; the fluid mud layer has minimal impact on navigation and can be ignored from an engineering application perspective.", "B": "Nautical depth refers to the vertical distance from the Lowest Astronomical Tide (LAT) to the navigable mud density interface; the fluid mud layer with density lower than the nautical density can be regarded as usable navigation depth.", "C": "Nautical depth is equivalent to channel design depth, with the fluid mud layer considered as the sedimentation allowance Z₄ in calculation.", "D": "Nautical depth is only applicable to inland waterways; seaport channels are not permitted to utilize the fluid mud layer as navigation depth."}, "a": "B"}, {"u": 5, "q": "According to design standards, the navigable width W of a one-way channel equals: the sum of the swept track width and the bank clearance on b.", "o": {"A": "the sum of the design vessel beam and the safety clearances on both sides", "B": "the sum of the swept track width and the bank clearance on both sides", "C": "the swept track width", "D": "the sum of the design vessel beam and the swept track width"}, "a": "B"}, {"u": 5, "q": "What is the fundamental distinction in terms of sediment deposition mechanisms between muddy coasts and silty coasts that necessitates different channel maintenance strategies? Silty coasts suffer sudden storm-induced siltation within ho.", "o": {"A": "Channels on muddy coasts experience deposition of cohesive sediments, while those on silty coasts have non-cohesive sediments.", "B": "Silty coasts suffer sudden storm-induced siltation within hours, whereas muddy coasts develop gradual deposition over months/years.", "C": "Deposition occurs only in channel bends on muddy coasts but affects straight sections on silty coasts.", "D": "Dredging effectively controls siltation on silty coasts but exacerbates deposition on muddy coasts."}, "a": "B"}, {"u": 5, "q": "Engineers proposed a design with an 80° angle between the channel and tidal current direction for a port. Which statement correctly evaluates this design? The design is acceptable if transverse current velocities du.", "o": {"A": "This design violates the optimal angle principle and is unacceptable.", "B": "The alignment is acceptable because ship maneuverability has been greatly improved in recent years.", "C": "The design is acceptable if transverse current velocities during vessel transit are below permissible limits, and it reduces dredging volume by minimizing the channel length.", "D": "The design is unacceptable because it places the channel in soft sediment zones, which is uneconomical."}, "a": "C"}];

const TFS = [{"u": 2, "q": "In general, the design vessel type and its dimensions can be directly selected from the actual calling vessel dimensions as the design vessel (i.e., the representative vessel type).", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 2, "q": "Vessel tonnage category refers to the deadweight tonnage (DWT) of commonly calling vessels.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 2, "q": "After constructing a jetty on a sandy coast, the down-drift side experiences deposition because longshore currents are blocked, while the up-drift side undergoes coastal erosion due to interruption of sediment supply.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 2, "q": "China adopts the Lowest Normal Low Water (LNLW) as both the chart datum and the port engineering zero, primarily to ensure navigational safety by guaranteeing that the actual water depth exceeds the charted depth for the vast majority of the time.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 2, "q": "Both silty coasts and muddy coasts experience channel siltation, but silty coasts exhibit sudden siltation (a single storm can fill the channel), while muddy coasts exhibit slow, continuous siltation without sudden siltation events.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 2, "q": "In the statistics of strong wind duration, if strong wind persists for 10 hours on a given day, that day is counted as half a day of lost operating time.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 2, "q": "The Lowest Normal Low Water (LNLW) is synthesized from 13 astronomical and shallow-water tidal constituents based on tidal constituent theory, representing the theoretically lowest possible tide level.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 2, "q": "In areas with strong longshore sediment transport on sandy coasts, regular channel dredging alone is sufficient to maintain water depth; there is no need to simultaneously construct offshore breakwaters or groins to intercept longshore sediment.", "o": {"A": "", "B": ""},
