<script>
// ===== QUESTION BANK =====
const MCQS = [{"u": 1, "q": "(Case Study) A coastal city has an 8 km natural shoreline with a national mangrove reserve on the land side and the city's only deep-water channel (depth >15 m) on the sea side. The city planning bureau proposes four alternatives. Based on the principles of \"effective protection and rational utilization\" and \"land-sea functional coordination,\" the optimal scheme is.", "o": {"A": "Relocate the mangrove reserve 1 km seaward, making the entire 8 km shoreline's water depth sufficient for deep-water berths, enabling contiguous port shoreline development — although the mangroves are shifted, the total protected area is not reduced", "B": "For the 4 km segment where the mangrove reserve and deep-water channel overlap, adopt an open-type elevated pile-supported wharf design (where the structure's obstruction to tidal flow does not exceed 15% of the natural state), while rerouting the land-side collection/distribution corridor to pass through a tunnel along the outer edge of the mangroves; retain the remaining 4 km as ecological shoreline", "C": "Designate the entire 8 km shoreline as port shoreline for unified development, and simultaneously plant an equal area of mangroves along the periphery of the original reserve as ecological compensation — \"occupy first, compensate later\" balances development and conservation", "D": "Designate the entire 8 km as ecological conservation shoreline and select a new site in a neighboring city for port construction — although the deep-water channel cannot be relocated, the distance loss can be compensated by a cross-city port-access railway"}, "a": "B"}, {"u": 1, "q": "Regarding the differences among natural ports, semi-natural ports, and artificial ports, which description is incorrect?", "o": {"A": "A natural port is built in a bay or estuary sheltered by natural terrain, remaining relatively calm even without protection structures", "B": "A semi-natural port requires only artificial protection at the entrance", "C": "An artificial port is completely protected by breakwaters or formed by dredging", "D": "A natural port requires no channel dredging maintenance whatsoever"}, "a": "D"}, {"u": 1, "q": "According to port classification by function, a dedicated terminal built for a large steel enterprise to import iron ore and export steel products belongs to.", "o": {"A": "Commercial port", "B": "Industrial port", "C": "Fishery port", "D": "Refuge harbor"}, "a": "B"}, {"u": 1, "q": "In the four-step port planning process, why must \"survey → forecasting → layout → approval\" follow this logical sequence?", "o": {"A": "Approval must precede survey to ensure legal validity", "B": "Layout design can precede demand forecasting to reflect forward-looking vision", "C": "Survey provides data for forecasting, forecasting provides scale basis for layout, and approval gives the plan legal force", "D": "Each step can be conducted independently without any sequential dependency"}, "a": "C"}, {"u": 1, "q": "According to port classification by function, which type of port is a \"government-invested, government-led public welfare project\"?", "o": {"A": "Commercial port", "B": "Industrial port", "C": "Fishery port", "D": "Naval port"}, "a": "C"}, {"u": 1, "q": "Which of the following descriptions about port water area components is INCORRECT?", "o": {"A": "The anchorage area serves vessels awaiting berths, undergoing quarantine, conducting lightering, seeking shelter, or emergency anchoring — it is located outside the navigation channel", "B": "The turning basin is the water area where vessels turn or change direction when berthing/unberthing or entering/departing the port — it is typically located in front of the wharf", "C": "The harbor basin is a concept completely equivalent to the berthing area — both terms refer to exactly the same water space with no distinction", "D": "The stopping area is the final segment of water where a vessel decelerates to a full stop after entering the port — it is positioned between the inner channel and the turning basin"}, "a": "C"}, {"u": 1, "q": "Regarding the basic vessel arrival and departure process, the correct sequence is.", "o": {"A": "Arrival → enter port area via channel → wait at anchorage → turn in turning basin → berth & moor → cargo handling → auxiliary operations → unmoor & depart", "B": "Arrival → wait at anchorage → enter port area via channel → turn in turning basin → berth & moor → auxiliary operations → cargo handling → unmoor & depart", "C": "Arrival → enter port area via channel → wait at anchorage → turn in turning basin → berth & moor → auxiliary operations → cargo handling → unmoor & depart", "D": "Arrival → wait at anchorage → enter port area via channel → turn in turning basin → berth & moor → cargo handling → auxiliary operations → unmoor & depart"}, "a": "B"}, {"u": 1, "q": "Regarding the relationship between TOS (Terminal Operating System) and ECS (Equipment Control System), the correct understanding is: TOS.", "o": {"A": "TOS and ECS are two completely independent systems with no interconnection", "B": "ECS is a subordinate module of TOS, responsible only for data storage", "C": "TOS focuses on intelligent planning of overall operations (business scheduling), while ECS focuses on precise equipment execution control, and the two systems work collaboratively", "D": "TOS and ECS are two different names for the same system"}, "a": "C"}, {"u": 1, "q": "Regarding the concept of \"Port Group,\" which of the following statements is correct?", "o": {"A": "A port group refers to the collection of all wharves within a single port area", "B": "A port group is simply another name for an individual port", "C": "China has five major port groups: Bohai Rim, Yangtze River Delta, Southeast Coast, Guangdong-Hong Kong-Macao, and Beibu Gulf Rim", "D": "The concept of a port group is equivalent to the collection of major ports"}, "a": "C"}, {"u": 1, "q": "Regarding the organizational hierarchy 'port group → port → port area → operation section → wharf → berth,' which statement contains a conceptual ERROR?", "o": {"A": "Dalian Port is a 'port' containing multiple port areas such as Dayaowan, Nianyuwann, and Changxingdao; this reflects that a port is the general term for all port facilities within one administrative region", "B": "The Dayaowan Port Area contains both a container operation section and a grain operation section; this reflects that a port area is divided into operation sections by cargo type", "C": "A 'port group' is simply another name for all the wharves within a single port area, and it is equivalent to the concept of a 'port area'", "D": "A wharf is the facility within an operation section for vessel berthing and cargo handling, and a single wharf may contain one or more berths"}, "a": "C"}, {"u": 1, "q": "Port planning must be coordinated with multiple types of related plans. Which of the following statements about such coordination is INCORRECT?", "o": {"A": "Port planning must be coordinated with territorial spatial planning — the latter defines the spatial scope and land-use conditions for port areas, constituting land-use coordination at the spatial level", "B": "Port planning must be coordinated with flood control planning — ensuring that port construction does not compromise flood control standards, and where necessary, implementing compensation or modification measures for flood control facilities", "C": "Port planning must be coordinated with comprehensive transportation planning — ensuring that the port's collection and distribution systems (railway, highway, pipeline) are integrated into the regional transportation network", "D": "Port planning and marine planning cover different domains (marine → sea area development and protection; port → shoreline and land area), so they can be developed independently without affecting the port's ultimate throughput capacity"}, "a": "D"}, {"u": 1, "q": "According to the textbook, port functions are divided into three layers: core/target functions, essential functions, and additional functions. Which set of functions below is CORRECTLY assigned to the 'additional functions' layer according to §1.1?", "o": {"A": "Vessel berthing, cargo storage, and cargo transfer between vessel and shore", "B": "Supplies, refueling, refuge, repairs and maintenance, and (from the 2nd generation onward) industrial facilities", "C": "Passenger embarkation/disembarkation, cargo lightering, and ship-to-shore cargo transfer", "D": "Port site selection, shoreline planning, and throughput forecasting"}, "a": "B"}, {"u": 1, "q": "Tianjin Port's Nanjiang Port Area was developed with dedicated petrochemical terminals serving Tianjin Petrochemical and Dagang Oilfield, forming a petrochemical port-vicinity industrial cluster. According to the UNCTAD port generation classification, this development phase corresponds to.", "o": {"A": "First-generation port: the port served purely as a water-land transshipment point, strictly confined to the wharf front and adjacent water/land areas", "B": "Second-generation port: the port broke through the enclosed port area boundaries and deeply integrated with port-vicinity industries, forming industrial symbiosis", "C": "Third-generation port: the port established bonded zones and developed international trade and financial services", "D": "Fourth-generation port: the port became a global supply chain core node with integrated port-shipping-trade operations and smart/digital platforms"}, "a": "B"}, {"u": 1, "q": "According to the functional classification of ports, which of the following statements contains an ERROR?（）", "o": {"A": "A commercial port is equipped with operation sections for different cargo types, typically located in cities with concentrated industry and commerce, developed economies, and convenient transportation — the relationship with the city is ‘port prospers the city, city promotes the port’", "B": "An industrial port serves as a dedicated terminal for large enterprises, used for importing raw materials and exporting finished products — e.g., Zhanjiang Port's Zhongke Refinery Terminal. It may be a standalone port or just a single wharf", "C": "A fishery port is a government-invested, government-led public welfare project, planned and approved by the Ministry of Transport", "D": "A naval port serves military purposes, berthing naval vessels and functioning as a supply station — e.g., the Midway Island Naval Port in the Pacific"}, "a": "C"}, {"u": 1, "q": "Dalian Port's Dayaowan Port Area includes a container operation section and a grain operation section. This reflects which organizational characteristic of a port?", "o": {"A": "Organization by administrative affiliation", "B": "Division of port areas by geographical location or functional relationship, and division of operation sections by cargo type within a port area", "C": "Division of operation sections by water depth", "D": "Division of operation sections by investor"}, "a": "B"}, {"u": 1, "q": "In the planning hierarchy, the Port General Layout Plan belongs to.", "o": {"A": "Detailed implementation planning at the individual port level", "B": "Strategic planning at the national or provincial level, addressing spatial distribution of port groups", "C": "Detailed design of operation sections within a port area", "D": "Engineering design of individual berths"}, "a": "B"}, {"u": 1, "q": "China implements a tiered approval system for port shoreline use. The deep-water shoreline approval process is: municipal-level preliminary review → provincial-level expert evaluation → joint approval by the Ministry of Transport and the National Development and Reform Commission. The institutional logic behind requiring such a high-level approval for deep-water shorelines is.", "o": {"A": "Deep-water shorelines are non-renewable strategic resources with extreme scarcity; high-level approval is required to prevent inefficient occupation driven by short-term local interests", "B": "Deep-water and non-deep-water shorelines are both non-renewable strategic resources, so their approval systems are in fact identical", "C": "Since local governments are most familiar with local conditions, the municipal preliminary review leverages their informational advantage, after which higher-level agencies make allocation decisions by balancing overall interests", "D": "The joint approval system by the MOT and NDRC is designed to concentrate approval authority in a single body so as to maximize the speed of shoreline development"}, "a": "A"}, {"u": 1, "q": "The definition of deep-water shoreline is.", "o": {"A": "Coastal: shoreline suitable for berths ≥100,000 DWT (Jiangsu section downstream of Nanjing Yangtze River Bridge: ≥30,000 DWT); Inland river: ≥3,000 DWT", "B": "Coastal: shoreline suitable for berths ≥100,000 DWT (Jiangsu section downstream of Nanjing Yangtze River Bridge: ≥50,000 DWT); Inland river: ≥3,000 DWT", "C": "Coastal: shoreline suitable for berths ≥200,000 DWT (Jiangsu section downstream of Nanjing Yangtze River Bridge: ≥100,000 DWT); Inland river: ≥3,000 DWT", "D": "Coastal: shoreline suitable for berths ≥200,000 DWT (Jiangsu section downstream of Nanjing Yangtze River Bridge: ≥100,000 DWT); Inland river: ≥5,000 DWT"}, "a": "B"}, {"u": 1, "q": "Port General Layout Plan and Port Master Plan are the two most fundamental planning types in China's port planning system. Which of the following MOST accurately captures their distinction?", "o": {"A": "The General Layout Plan determines a single port's functional positioning and port area division, while the Master Plan coordinates the spatial distribution of multiple ports within a region", "B": "The General Layout Plan is at the strategic level (national/regional), addressing how multiple ports reasonably divide functions and how shoreline resources are allocated as a whole; the Master Plan is at the implementation level (single port), determining that specific port's nature, function, water/land scope, and port area division", "C": "The General Layout Plan and the Master Plan have identical planning objects and content; they differ only in the name of the approving authority", "D": "The General Layout Plan is a sub-component of the Master Plan, serving to further detail the Master Plan's content"}, "a": "B"}, {"u": 1, "q": "In port planning compilation, the port survey stage needs to investigate all of the following except.", "o": {"A": "Natural conditions in the port site selection area", "B": "Socio-economic conditions and industrial layout of the hinterland", "C": "Existing port facilities and operational status", "D": "Specific construction plans of contractors"}, "a": "D"}, {"u": 1, "q": "The \"comprehensive perception\" feature of smart ports covers five core objects, which are.", "o": {"A": "Vessels, cargo, equipment, environment, and personnel", "B": "Wharves, yards, channels, anchorages, and basins", "C": "Quay cranes, yard cranes, AGVs, trucks, and vessels", "D": "Wind, waves, tides, currents, and temperature"}, "a": "A"}, {"u": 1, "q": "According to the 4th edition textbook, the standard for deep-water shoreline of coastal ports is.", "o": {"A": "Shoreline suitable for constructing berths for vessels of 10,000 DWT and above", "B": "Shoreline suitable for constructing berths for vessels of 50,000 DWT and above", "C": "Shoreline suitable for constructing berths for vessels of 100,000 DWT and above (50,000 DWT and above for the Jiangsu section downstream of the Nanjing Yangtze River Bridge)", "D": "Shoreline suitable for constructing berths for vessels of 300,000 DWT and above"}, "a": "C"}, {"u": 1, "q": "Regarding the concept of 'port group' and its relationship with other port planning concepts, which statement is CORRECT?", "o": {"A": "A port group is a regional cluster where multiple ports develop in coordination at a spatial scale larger than an individual port — China's five major port groups are the Bohai Rim, Yangtze River Delta, Southeast Coast, Guangdong-Hong Kong-Macao, and Beibu Gulf Rim", "B": "A port group refers to a single port's collection of all port areas, equivalent to the concept of a 'port'", "C": "The concept of a port group applies only to inland river ports, not to coastal ports", "D": "The concept of a port group is exactly the same as the 'major port' classification — they are interchangeable terms"}, "a": "A"}, {"u": 1, "q": "Regarding the approval procedures for port plans at different levels in China, which statement is CORRECT?", "o": {"A": "A Port Master Plan is jointly approved by the Ministry of Transport and the provincial government; a Port General Layout Plan at the national level is approved by the State Council", "B": "Both the Port General Layout Plan and the Port Master Plan are independently approved by the municipal port authority", "C": "A Port Master Plan is approved by the municipal government alone; a Port General Layout Plan is approved by the Ministry of Transport alone", "D": "The approval authority for the Port General Layout Plan is the same as for the Port Area Detailed Plan — both are handled by the provincial government"}, "a": "A"}, {"u": 2, "q": "Port capacity is NOT affected by which of the following factors?", "o": {"A": "The total number of berths and their handling efficiencies", "B": "Storage facility capacity", "C": "Access channel capacity", "D": "Cargo throughput"}, "a": "D"}, {"u": 2, "q": "Regarding the advantages of containerized transport, which statement contains a conceptual error?", "o": {"A": "It is compatible with standardized handling equipment, resulting in high loading/unloading efficiency", "B": "It provides safe protection for fragile goods", "C": "It offers door-to-door service and multimodal transport, enabling \"single-ticket\" logistics", "D": "The greatest advantage of containerized transport lies in its large single-ship cargo capacity"}, "a": "D"}, {"u": 2, "q": "Among the following four sets of vessel tonnage correspondences, which one contains an error under current standards? 8.", "o": {"A": "100,000-tonne class bulk carrier → 100,000 DWT", "B": "200,000 GT cruise ship → 200,000 GT", "C": "80,000-tonne class container ship → 80,000 GT", "D": "150,000 GT LNG carrier → 150,000 GT"}, "a": "C"}, {"u": 2, "q": "Statistical data for existing bulk carriers calling at a port shows that 99% of vessels have a draft not exceeding 14.0m, 95% not exceeding 13.0m, and 85% not exceeding 12.0m. What should be the basic vessel draft for access channel water depth design?", "o": {"A": "14.0m", "B": "13.0m", "C": "12.0m", "D": "The information given is insufficient to determine"}, "a": "C"}, {"u": 2, "q": "When forecasting port throughput for a new port in an economically unstable region, planners should use qualitative and quantitative methods. Which of the following statements is correct?", "o": {"A": "Forecasting primarily relies on quantitative methods to ensure accurate predictions.", "B": "Qualitative methods (e.g., Delphi) better handle uncertainty in socio-political factors such as trade policy shifts.", "C": "Time-series regression cannot predict non-linear cargo growth patterns.", "D": "Causal relation methods overemphasize GDP accuracy."}, "a": "B"}, {"u": 2, "q": "The data duration requirements for wind rose, multi-year mean sea level, and extreme wind speed series differ. Which match is correct?", "o": {"A": "Wind rose ≥ 3 years; Mean sea level: 19 years; Annual max wind series ≥ 20 years", "B": "Wind rose ≥ 5 years; Mean sea level: 11 years; Annual max wind series ≥ 10 years", "C": "Wind rose ≥ 1 year; Mean sea level: 19 years; Annual max wind series ≥ 30 years", "D": "Wind rose ≥ 3 years; Mean sea level: 30 years; Annual max wind series ≥ 15 years"}, "a": "A"}, {"u": 2, "q": "According to the sediment grain-size classification for coastal types in harbor and waterway engineering, the median grain size D₅₀ ranges for sandy coast, silty coast, and muddy coast are.", "o": {"A": "Sandy: D₅₀ > 0.1 mm; Silty: 0.03 < D₅₀ < 0.1 mm; Muddy: D₅₀ < 0.03 mm", "B": "Silty: D₅₀ > 0.2 mm; Sandy: 0.05 < D₅₀ < 0.2 mm; Muddy: D₅₀ < 0.05 mm", "C": "Silty: D₅₀ > 0.0625 mm; Sandy: 0.002 < D₅₀ < 0.0625 mm; Muddy: D₅₀ < 0.002 mm", "D": "Sandy: D₅₀ > 0.1 mm; Silty: D₅₀ < 0.03 mm; Muddy: 0.03 < D₅₀ < 0.1mm"}, "a": "A"}, {"u": 2, "q": "Longshore sediment transport on sandy coasts is significantly affected by port structures. After constructing a jetty on a sandy coast, which description of the up-drift and down-drift erosion/deposition changes is correct?", "o": {"A": "The jetty completely blocks longshore transport; both the up-drift and down-drift sides experience deposition due to reduced flow velocity", "B": "The up-drift side experiences sediment deposition as longshore currents are blocked, while the down-drift side undergoes coastal erosion", "C": "The jetty only causes local scour near the jetty head and has no systematic effect on the up-drift and down-drift shorelines", "D": "The down-drift side experiences deposition as sediment bypasses the jetty head, while the up-drift side erodes due to loss of longshore sediment"}, "a": "B"}, {"u": 2, "q": "Extreme High Water Level (EHWL) uses a 50-year return period standard, while mean sea level has an 18.6-year long-period fluctuation. Which analysis of this discrepancy is most accurate?", "o": {"A": "The annual extremes of water level contain not only astronomical high tides but also non-periodic extreme meteorological events (typhoon storm surges, cold-wave winds) in certain years", "B": "50 years is approximately 2.7 times 18.6 years; rounding to 50 years covers about 3 complete nodal cycles for a more conservative value", "C": "18.6 years only applies to mean sea level; extreme water levels should actually use a 100-year return period, and 50 years is a simplified value in Chinese codes", "D": "Both extreme water level and mean sea level are dominated by astronomical tides, sharing essentially the same 18.6-year period; the 50-year return period is merely an artificially amplified safety factor"}, "a": "A"}, {"u": 2, "q": "For the problem of sudden channel siltation on silty coasts, what is the most important engineering measure during the port design stage?", "o": {"A": "Increase the design channel depth to reserve sufficient sudden siltation tolerance", "B": "Construct sediment barriers along the channel, with their heads extending beyond the breaker point to block longshore sediment transport from entering the channel at the source", "C": "Adjust channel alignment to be parallel to the shoreline to reduce the flow cross-sectional area", "D": "Install gates at the channel entrance that open only when vessels enter or leave"}, "a": "B"}, {"u": 2, "q": "Regarding containerized transport, which statement contains the most serious conceptual error from a port planning perspective?", "o": {"A": "Containers enable door-to-door transport, significantly reducing intermediate transshipment operations", "B": "The core advantage of containerized transport lies in using standardization to compensate for the limited cargo capacity per unit, improving the entire supply chain efficiency through scale and systematization", "C": "The cargo capacity per ship of container vessels far exceeds that of bulk carriers of the same tonnage, so container terminals should be prioritized for development", "D": "Containerization has improved the loading/unloading efficiency of general cargo by tens of times"}, "a": "C"}, {"u": 2, "q": "What surveys are required in Port general layout plan and Port master plan, respectively?", "o": {"A": "Port layout planning requires comprehensive surveys of both economic/social and natural conditions; Port master plan focuses on natural condition surveys", "B": "Port layout planning requires comprehensive surveys of both economic/social and natural conditions; Port master plan focuses on economic/social surveys", "C": "Port layout planning focuses on economic/social surveys; Port master plan requires comprehensive surveys of both economic/social and natural conditions", "D": "Port layout planning focuses on natural condition surveys; Port master plan requires comprehensive surveys of both economic/social and natural conditions"}, "a": "C"}, {"u": 2, "q": "A student wrote in an exam: \"The molded draft is the vertical distance measured from the lower edge of the keel to the loaded waterline, and is used for ship performance research.\" How many factual errors are in this statement?", "o": {"A": "0 errors — completely correct", "B": "1 error — the molded draft is measured from the upper edge of the keel, not the lower edge", "C": "2 errors — (1) the molded draft is measured from the upper edge of the keel, not the lower edge; (2) the molded draft is used as the basis for port engineering design", "D": "3 errors — also including that \"vertical distance\" should be \"horizontal distance\""}, "a": "B"}, {"u": 2, "q": "Regarding the usage scenarios of DWT and GT, which set of correspondences is entirely correct?", "o": {"A": "Container ships use GT; passenger ships use DWT; crude oil tankers use DWT", "B": "Bulk carriers use DWT; LNG carriers use GT; Ro-Ro car carriers use GT", "C": "General cargo ships use GT; ore carriers use DWT; cruise ships use DWT", "D": "Oil tankers use GT; LPG carriers use DWT; Ro-Pax ships use DWT"}, "a": "B"}, {"u": 2, "q": "Regarding the beam parameter adopted in the design vessel dimensions table of the “Design Code of General Layout for Sea Ports” (JTS 165), which statement is correct? Delphi.", "o": {"A": "Molded beam is adopted; molded beam is an internationally universal standard ship parameter, and using molded beam plus allowances can cover most situations", "B": "Molded beam is adopted; molded beam is closely related to the maneuvering performance of vessels during berthing and unberthing", "C": "Extreme (overall) beam is adopted; extreme beam is the maximum vessel width, and using extreme beam plus allowances can cover most situations", "D": "Extreme (overall) beam is adopted; extreme beam is closely related to the maneuvering performance of vessels during berthing and unberthing"}, "a": "A"}, {"u": 2, "q": "From a social psychology perspective, what is the core purpose of the \"multi-round anonymous feedback\" mechanism in the Delphi method? Delphi.", "o": {"A": "To increase the number of forecasting rounds to improve the statistical sample size", "B": "To eliminate \"groupthink\" and the \"authority figure effect\"", "C": "To extend the forecasting period so that experts have sufficient time to review data", "D": "To reduce random errors by averaging multiple rounds of voting"}, "a": "B"}, {"u": 2, "q": "Which of the following correctly describes the characteristics and applicable scope of Expert Judgment and Model-based (Quantitative) methods in port cargo throughput forecasting?", "o": {"A": "The core advantage of Model-based methods is their ability to handle disruptive factors (e.g., trade wars, Suez Canal blockage) and provide forecasts with statistical accuracy metrics even when data is missing.", "B": "Because expert judgment is highly subjective and unreliable for long-term forecasting, it should not be used when data is complete.", "C": "Model-based methods are reproducible and excel at uncovering long-term trends and seasonal cycles, but they assume historical patterns will persist, handle structural breaks poorly, and lack forward-looking capability.", "D": "Typical examples of expert judgment methods are time series analysis and causal analysis, whose advantages lie in objectivity, reproducibility, and statistical accuracy metrics."}, "a": "C"}, {"u": 2, "q": "Regarding the effect of wind on vessels, which of the following statements is correct?", "o": {"A": "The along-ship wind force acting on a vessel is far greater than the cross-wind force", "B": "A fully loaded vessel experiences greater wind forces", "C": "A vessel in ballast condition experiences greater wind forces", "D": "Wind has little effect on large container ships because of their large deadweight"}, "a": "C"}, {"u": 2, "q": "What is the primary application scenario of Extreme Low Water Level (ELWL, 50-year return period annual minimum) in port design? ρ=0.8.", "o": {"A": "Determining the basic standard for wharf deck elevation", "B": "Checking vessel draft safety and verifying structural stability", "C": "Serving as the datum for calculating water depth at the wharf apron under serviceability conditions", "D": "Determining breakwater crest elevation"}, "a": "B"}, {"u": 2, "q": "Regarding the selection of tidal constituents in harmonic analysis, which statement is correct? 13.", "o": {"A": "All tidal harmonic analyses uniformly select 11 constituents to meet accuracy requirements", "B": "The number of constituents increases with higher accuracy requirements; a complete harmonic analysis typically needs to cover astronomical, long-period, and shallow-water constituents, with the actual number reaching tens to over a hundred", "C": "Fewer constituents are better because more constituents lead to greater computational errors", "D": "Selecting only 8 astronomical constituents is sufficient for tidal prediction at any accuracy level"}, "a": "B"}, {"u": 2, "q": "There is a fundamental difference in channel siltation characteristics between silty coasts and muddy coasts. Which statement is correct?", "o": {"A": "Both are dominated by suspended load transport, and siltation is a slow, continuous process without sudden siltation events", "B": "On silty coasts, sediments have low threshold velocity and settle quickly; after heavy wave events, rapid siltation can occur (a single storm can fill a channel). On muddy coasts, suspended sediment settling is extremely slow, and siltation is a long-term gradual process", "C": "Silty coasts are dominated by bed load transport, with siltation occurring only near channel boundaries; muddy coasts are dominated by suspended load, with uniform deposition across the entire cross-section", "D": "Both have identical siltation characteristics; silty coast siltation rates are just about one order of magnitude slower than muddy coast siltation rates"}, "a": "B"}, {"u": 2, "q": "Regarding the determination of design vessel dimensions, which statement is correct?", "o": {"A": "The design vessel dimensions should be no less than the percentile value corresponding to 85% of the statistically surveyed calling vessels", "B": "The design vessel dimensions should be no less than 85% of the maximum dimensions of calling vessels", "C": "The design vessel dimensions should cover the dimensions of the largest calling vessel to improve port service level", "D": "None of the above is correct"}, "a": "A"}, {"u": 2, "q": "When designing ship locks and dry docks, which width parameter of the vessel requires special consideration, and why?", "o": {"A": "Molded beam, because it is the standard parameter for ship performance calculations", "B": "Extreme (overall) beam, because the true maximum width is needed when a vessel passes through a lock", "C": "Molded beam, because all formulas in lock design codes use molded beam as input", "D": "Extreme (overall) beam, because it is the standard parameter for vessel performance calculations"}, "a": "B"}, {"u": 2, "q": "Regarding molded dimensions and actual (extreme) dimensions of vessels, which statement is correct?", "o": {"A": "Molded dimensions are used for ship performance research and design; actual dimensions are used for the engineering design of ship locks and dry docks", "B": "Molded dimensions are used for ship performance research and design; actual dimensions are used for the layout design of seaport terminals", "C": "Actual dimensions are used for ship performance research and design; molded dimensions are used for the engineering design of ship locks and dry docks", "D": "Actual dimensions are used for ship performance research and design; molded dimensions are used for the layout design of seaport terminals"}, "a": "A"}, {"u": 2, "q": "In port planning, the results of economic/social surveys and natural condition surveys primarily serve which planning stages, respectively?", "o": {"A": "Natural condition surveys serve throughput forecasting and vessel type determination; economic/social surveys serve site selection and layout planning", "B": "Economic/social surveys serve throughput forecasting and vessel type determination; natural condition surveys serve site selection and layout planning", "C": "Natural condition surveys serve layout planning; economic/social surveys serve site selection, throughput and vessel type determination", "D": "Economic/social surveys serve layout planning; natural condition surveys serve site selection, throughput and vessel type determination"}, "a": "B"}, {"u": 2, "q": "What is the definition of Gross Tonnage (GT)?", "o": {"A": "The displacement weight of the ship at full load", "B": "The total internal volume of the ship", "C": "The maximum weight of cargo the ship can carry", "D": "The product of LOA × molded beam × molded depth"}, "a": "B"}, {"u": 2, "q": "In China's port statistics, the cargo code for \"mineral construction materials\" is 05, and \"non-metallic ores\" is 08. When classified by transport and handling technology, which category do these two types of cargo most likely fall into, respectively?", "o": {"A": "Both belong to general/break-bulk cargo", "B": "Code 05 belongs to dry bulk; code 08 belongs to general/break-bulk cargo", "C": "Both belong to dry bulk cargo", "D": "Code 05 belongs to general/break-bulk cargo; code 08 belongs to dry bulk cargo"}, "a": "C"}, {"u": 2, "q": "Goods are shipped from Region A via Port P to Port Q, and then transshipped to Region B. According to the textbook definition of port hinterland, which of the following is correct? M/V.", "o": {"A": "Region A is the rear hinterland of Port P, and Region B is the seaward (front) hinterland of Port P; in general usage, \"hinterland\" refers to the seaward hinterland", "B": "Region A is the seaward hinterland of Port P, and Region B is the rear hinterland of Port P; in general usage, \"hinterland\" refers to the seaward hinterland", "C": "Region A is the rear hinterland of Port P, and Region B is the seaward (front) hinterland of Port P; in general usage, \"hinterland\" refers to the rear (inland) hinterland", "D": "Region A is the seaward hinterland of Port P, and Region B is the rear hinterland of Port P; in general usage, \"hinterland\" refers to the rear (inland) hinterland"}, "a": "C"}, {"u": 2, "q": "Since 1980, which water level datum has been uniformly adopted as the zero point for port engineering in China? 1985.", "o": {"A": "Yellow Sea Datum 1956", "B": "National Vertical Datum 1985", "C": "Lowest Normal Low Water (LNLW)", "D": "Local mean sea level"}, "a": "C"}, {"u": 2, "q": "To produce a reasonably reliable wind rose diagram, how many years of continuous wind observation data are generally required?", "o": {"A": "More than 1 year", "B": "More than 3 years", "C": "More than 10 years", "D": "More than 20 years"}, "a": "B"}, {"u": 2, "q": "In port planning and layout, which of the following about wind is correct？.", "o": {"A": "Measured at 10 m above the sea surface, and take the wind speed and direction averaged over 10 min", "B": "Measured at 2 m above the sea surface, and take the wind speed and direction averaged over 10 min", "C": "Measured at 10 m above the sea surface, and take the maximum wind speed and corresponding direction within every 10 min", "D": "Measured at 2 m above the sea surface, and take the maximum wind speed and corresponding direction within every 10 min"}, "a": "A"}, {"u": 2, "q": "How many principal tidal constituents are required to synthesize the chart datum (Lowest Normal Low Water, LNLW) in China?", "o": {"A": "11 astronomical tidal constituents", "B": "11 constituents: 8 astronomical + 2 long-period + 1 shallow-water", "C": "13 astronomical tidal constituents", "D": "13 constituents: 8 astronomical + 2 long-period + 3 shallow-water"}, "a": "D"}, {"u": 2, "q": "DHWL and DLWL primarily consider water level changes caused by astronomical tides and largely disregard meteorological factors. What is the fundamental reason for this provision?", "o": {"A": "DHWL and DLWL correspond to the serviceability limit state", "B": "The magnitude of water level changes caused by meteorological factors is far smaller than the astronomical tidal amplitude; the impact on the 10% and 90% cumulative frequency quantiles is statistically negligible", "C": "The cumulative frequency statistical method inherently filters out meteorological factors — storm surges are naturally diluted among hundreds of samples throughout the year", "D": "Codes require filtering out storm surge components from measured tidal data before performing cumulative frequency statistics"}, "a": "A"}, {"u": 2, "q": "Which correctly states the cumulative frequency standards for Design High Water Level (DHWL) and Design Low Water Level (DLWL) in sea port design?", "o": {"A": "DHWL: high-tide cumulative frequency 1%; DLWL: low-tide cumulative frequency 98%", "B": "DHWL: high-tide cumulative frequency 10%; DLWL: low-tide cumulative frequency 90%", "C": "DHWL: duration cumulative frequency 5%; DLWL: duration cumulative frequency 95%", "D": "DHWL: high-tide cumulative frequency 20%; DLWL: low-tide cumulative frequency 80%"}, "a": "B"}, {"u": 2, "q": "What is the core idea of the \"Reserved Design Vessel\" strategy? Which of the following practices best reflects this strategy?", "o": {"A": "The marine structures, access channels, and anchorages are all built at once to accommodate the maximum future vessel size, enhancing adaptability to future vessel enlargement", "B": "The marine (sub)structures of the wharf are built at once to accommodate a larger reserved future vessel type, while ancillary facilities such as access channels and anchorages can be upgraded in phases", "C": "The marine structures, channels, and anchorages are all built for the current calling vessel type, but the loading/unloading machinery is designed for the reserved vessel type to enhance handling capacity", "D": "All marine structures, channels, anchorages, and handling equipment are built for the current calling vessel type, with development shoreline reserved to prepare for the trend of vessel enlargement"}, "a": "B"}, {"u": 2, "q": "The 8th generation container ship is known as \"Malaccamax.\" Which of the following analyses of the limiting factors for this vessel type is correct?", "o": {"A": "The Malacca Strait is the only factor limiting the 8th generation vessel type", "B": "The 8th generation vessel type is constrained by multiple factors; the water depth of the Malacca Strait limits the fully-loaded draft", "C": "The 8th generation vessel type is completely free from any strait or canal limitations", "D": "The Malacca Strait limits the beam rather than the draft"}, "a": "B"}, {"u": 2, "q": "Regarding surveys in Port general layout plan and Port master plan, which of the following statements is correct?", "o": {"A": "Port layout planning focuses on economic/social surveys, used to determine the functional positioning of each port within the region", "B": "Port master planning focuses on economic/social surveys, used to determine the functional positioning of each port within the region", "C": "Port layout planning focuses on natural condition surveys, primarily for port site selection", "D": "Port master planning focuses on natural condition surveys, primarily for port site selection"}, "a": "A"}, {"u": 2, "q": "A port used time-series analysis and causal analysis to obtain throughput forecasts for 2035 of 4.2 million tonnes and 3.8 million tonnes, respectively. The planner directly reported \"the forecast is 4.0 million tonnes (average of the two methods).\" What is the most fundamental methodological problem with this approach?", "o": {"A": "The arithmetic mean is not the most appropriate measure of central tendency; the geometric mean should be used", "B": "The applicability of the two methods in this specific scenario was not verified before taking the average", "C": "The two methods differ by 0.4 million tonnes (about 10%), which is too large to combine", "D": "A weighted average should be used instead of a simple average"}, "a": "B"}, {"u": 2, "q": "To calculate Extreme High Water Level (EHWL) and Extreme Low Water Level (ELWL), the minimum required duration of continuous annual extreme tidal level observations is.", "o": {"A": "5 years", "B": "10 years", "C": "20 years", "D": "30 years"}, "a": "C"}, {"u": 2, "q": "What is the primary cause of the periodic variation in mean sea level?", "o": {"A": "Seasonal variation in the Earth's rotation speed", "B": "The 18.6-year periodic variation in the inclination of the Moon's orbital plane relative to the Earth's equatorial plane", "C": "The 11-year sunspot cycle", "D": "Thermal expansion and contraction of seawater caused by seasonal temperature changes"}, "a": "B"}, {"u": 2, "q": "Some ports use the duration cumulative frequency curve method to determine design water levels. In this method, DHWL and DLWL correspond to.", "o": {"A": "Duration cumulative frequency 10% and 90%", "B": "Duration cumulative frequency 1% and 98%", "C": "Duration cumulative frequency 5% and 95%", "D": "Duration cumulative frequency 10% and 98%"}, "a": "B"}, {"u": 2, "q": "Strong wind: NW (low frequency, extreme speed). Prevailing wind: SE (high frequency, moderate speed). For berth axis design, which approach is most reasonable?", "o": {"A": "Align berth axis parallel to SE to maximize daily berthing convenience", "B": "Align berth axis perpendicular to NW to resist strong wind impact", "C": "Minimize the angle between berth axis and NW, while not making the angle with SE excessively large", "D": "Berth axis orientation is determined solely by channel alignment and current direction"}, "a": "C"}, {"u": 2, "q": "To obtain an accurate multi-year mean sea level, the minimum required duration of continuous tidal observation data is.", "o": {"A": "1 year", "B": "11 years", "C": "19 years", "D": "30 years"}, "a": "C"}, {"u": 2, "q": "Due to different sediment transport characteristics, the site selection strategies for silty coasts and sandy coasts are fundamentally different. Which statement is correct?", "o": {"A": "Both are dominated by longshore transport; silty coasts only need jetties like sandy coasts to prevent siltation", "B": "Sandy coasts primarily use breakwaters/jetties to intercept longshore transport, while silty coasts require long-distance sediment barriers with heads extending beyond the breaker point, because silty sediments are easily suspended and the sudden siltation risk is far higher than on sandy coasts", "C": "Sediment issues need not be considered in silty coast site selection because siltation rates are far slower than on sandy coasts", "D": "Sandy coasts use offshore breakwaters, and silty coasts use sediment barriers; measures are different"}, "a": "B"}, {"u": 2, "q": "The generational classification of container ships is closely related to the transit capacity of key waterways. Which of the following correctly describes the relationship between ship type classification and waterway constraints?", "o": {"A": "Panamax vessels are limited by the width of the old Panama Canal locks; Post-Panamax vessels have exceeded the old lock limitations and can adapt to the new lock dimensions", "B": "Panamax vessels are limited by the draft of the Suez Canal; Post-Panamax vessels are limited by the draft of the Malacca Strait", "C": "Panamax vessels are limited by the outreach of port quay cranes; Post-Panamax vessels are limited by channel depth", "D": "Both Panamax and Post-Panamax vessels are limited by the new Panama Canal locks (commissioned in 2016)"}, "a": "A"}, {"u": 2, "q": "Regarding the logical chain of economic and social survey for port planning, which sequence is correct?", "o": {"A": "Analysis of current economic development → Survey of resources and industrial structure → Forecast of future economic trends → Prediction of calling vessel types → Throughput forecast", "B": "Analysis of current economic development → Survey of resources and industrial structure → Forecast of future economic trends → Throughput forecast → Prediction of calling vessel types", "C": "Resources/industrial structure and trade conditions → Current economic development level and goals → Future economic development trends → Port transport demand → Throughput forecast → Calling vessel type prediction", "D": "Resources/industrial structure and trade conditions → Current economic development level and goals → Future economic development trends → Port transport demand → Calling vessel type prediction → Throughput forecast"}, "a": "C"}, {"u": 2, "q": "Regarding the TEU (Twenty-Foot Equivalent Unit) for containers, which of the following statements is correct? 5000.", "o": {"A": "A 40-foot container counts as 2 TEU, with internal dimensions of approximately 12m × 2.3m × 2.3m", "B": "TEU is a weight unit for containers; 1 TEU corresponds to a net cargo weight of 8 tonnes", "C": "The standard container dimensions (width × height) are 8.5 × 9.5 feet", "D": "The actual gross weight of a 20-foot container is fixed at 20.3 tonnes"}, "a": "A"}, {"u": 2, "q": "A port has 25 years of continuous annual max wind speed data (10-min avg). Which approach to determining the design wind speed is correct?", "o": {"A": "Take the max observed value from 25 years and multiply by a safety factor of 1.2", "B": "Fit the annual max wind series to an extreme-value type I (Gumbel) distribution and derive the 50-year return value", "C": "The 25-year period is insufficient for deriving a 50-year return value; seek a reference station", "D": "Take the mean of 25-year data plus three standard deviations as an approximation"}, "a": "B"}, {"u": 2, "q": "100,000 DWT ship: emergency stopping distances: full 580m, half 980m, dead slow 1,450m. Visibility: 1,100m. Per \"inertial distance must be compatible with visibility distance\" principle, which is correct?", "o": {"A": "Dead slow entry (inertia 1,450m) with experienced pilot and radar: safe", "B": "Half speed entry (inertia 980m) with visual lookout: safe", "C": "200,000 DWT half speed (inertia 1,250m), speed reduced to 980m inertia: safe", "D": "Dead slow entry (inertia 1,450m), visibility improves to 1,200m after entry: safe"}, "a": "B"}, {"u": 2, "q": "What is the current unified datum for land elevation measurement in China? 1985.", "o": {"A": "Lowest Normal Low Water (LNLW)", "B": "Yellow Sea Datum 1956", "C": "National Vertical Datum 1985", "D": "Local port construction zero points"}, "a": "C"}, {"u": 2, "q": "According to the \"Load Code for Harbour Engineering\" (JTS 144-1-2010), the basic wind pressure corresponds to which design wind speed standard?", "o": {"A": "10 m above ground, 20-year return period, 10-min average maximum wind speed", "B": "10 m above ground, 50-year return period, 10-min average maximum wind speed", "C": "10 m above ground, 50-year return period, 1-h average maximum wind speed", "D": "20 m above ground, 50-year return period, 10-min average maximum wind speed"}, "a": "B"}, {"u": 2, "q": "Regarding the relationship of DHWL and DLWL with astronomical tides and meteorological factors, which statement is correct?", "o": {"A": "DHWL and DLWL are based on measured tidal data and fully reflect the influence of meteorological factors", "B": "DHWL and DLWL primarily consider tidal fluctuations caused by astronomical tides and largely disregard meteorological factors", "C": "DHWL and DLWL completely exclude meteorological factors and contain only pure astronomical tidal components", "D": "DHWL and DLWL primarily reflect meteorological influences (pressure changes, storm surges), with astronomical tides serving only as background reference"}, "a": "B"}, {"u": 2, "q": "In port planning, what is the standard measurement height for wind speed data?", "o": {"A": "5 m above water surface", "B": "10 m above water surface", "C": "15 m above water surface", "D": "20 m above water surface"}, "a": "B"}, {"u": 3, "q": "The typical handling process flow at a dry bulk export terminal (loading terminal) is.", "o": {"A": "Wagon unloader unloads wagons → belt conveyor → mobile conveyor → direct ship loading (the most commonly used direct transfer mode).", "B": "Wagon unloader unloads wagons → belt conveyor → yard stacking → reclaimer reclaims → ship loader loads the vessel.", "C": "Ship unloader discharges → belt conveyor → direct truck loading.", "D": "Ship unloader discharges → belt conveyor → yard stacking → reclaimer reclaims → wagon/truck loader loads."}, "a": "C"}, {"u": 3, "q": "Regarding horizontal handling machinery at general cargo terminals, which of the following statements is correct?", "o": {"A": "Forklift trucks combine both horizontal transport and vertical lifting functions, with an economic transport distance generally less than 150", "B": "Full-trailer tractors are classified as hoisting machinery in port handling technology.", "C": "Forklift trucks can only perform horizontal transport and do not have vertical lifting capability.", "D": "The economic transport distance of tractor-trailer combinations is generally less than 150"}, "a": "D"}, {"u": 3, "q": "Which of the following facilities is NOT a component of a butterfly-shaped liquid bulk berth?", "o": {"A": "Stacker-reclaimer", "B": "Loading platform", "C": "Berthing dolphins", "D": "Mooring dolphins"}, "a": "D"}, {"u": 3, "q": "The loading process flow at a liquid bulk terminal (oil terminal) is.", "o": {"A": "Ship → loading arm → pipeline → pump → storage tank.", "B": "Storage tank → loading arm → pump → ship (no metering required).", "C": "Storage tank → pipeline → metering → pump → loading arm → ship.", "D": "Storage tank → pump → pipeline → metering → loading arm/hose → ship."}, "a": "D"}, {"u": 3, "q": "Regarding the straddle carrier at container terminals, which of the following statements is correct? 20.", "o": {"A": "The straddle carrier, with its portal frame straddling containers, combines both horizontal transport and yard stacking functions.", "B": "Straddle carriers can only be used for yard stacking and cannot perform horizontal transport.", "C": "Straddle carriers are widely used at container terminals in China and are the mainstream yard handling equipment.", "D": "Straddle carriers are low-cost and have a low failure rate, making them the most economical yard equipment."}, "a": "C"}, {"u": 3, "q": "Regarding automated container terminals, which of the following statements is correct?", "o": {"A": "At fully automated terminals, QC operators are still required to operate on-site in the driver cabin.", "B": "Semi-automated terminals typically achieve automation only in the yard handling link (ARMG/ARTG).", "C": "Semi-automated terminals achieve automation only in the horizontal transport link.", "D": "Fully automated terminals achieve automation only in the horizontal transport link."}, "a": "B"}, {"u": 3, "q": "Regarding marine loading arms, which of the following statements is incorrect?", "o": {"A": "Loading arms have low investment cost and are universally adopted handling equipment at all types of oil terminals.", "B": "Loading arms are applicable to ship-to-shore handling operations at all types of oil terminals.", "C": "Loading arms can be operated manually or automatically, with rapid connection, high transfer efficiency, and long service life.", "D": "Loading arms are composed of metal pipes and swivel joints, and the connection interface can move freely within a certain range."}, "a": "B"}, {"u": 3, "q": "Regarding ship-to-shore handling equipment at dedicated container terminals, which of the following statements is correct? sheltered.", "o": {"A": "Either portal cranes or quayside container cranes (QCs) can be selected for ship-to-shore operations to suit different throughput levels.", "B": "The quayside container crane (QC) is the only main equipment for ship-to-shore handling at dedicated container terminals.", "C": "To save initial investment, a portal crane equipped with a container spreader can temporarily replace a QC.", "D": "Both QCs and rubber-tyred gantry cranes (RTGs) can perform ship-to-shore handling at the quay apron."}, "a": "D"}, {"u": 3, "q": "Regarding the unloading process flow of the drop-and-pull transport system at a Ro-Ro terminal, which of the following statements is correct?", "o": {"A": "Shipborne trailers can drive out of the hold on their own without tractor assistance.", "B": "Dispatch tractor heads to the ship hold → hook up trailers to be unloaded → drive out of the hold → go to the yard or consolidation area → drop off trailers.", "C": "Dispatch tractor heads to the yard → hook up trailers to be unloaded → drive into the ship hold.", "D": "Quayside cranes are used to lift trailers out of the ship hold."}, "a": "D"}, {"u": 3, "q": "When a general cargo terminal needs to conduct truck-to-ship direct transfer operations in water-land intermodal transport, which hoisting machinery should be given the highest priority?", "o": {"A": "Gantry crane", "B": "Multi-purpose portal crane", "C": "Tire crane", "D": "Floating crane"}, "a": "A"}, {"u": 3, "q": "Among the following dry bulk ship-unloading equipment, which belongs to continuous-operation machinery?", "o": {"A": "Chain bucket unloader", "B": "Portal crane with hopper", "C": "Portal crane", "D": "Bridge-type grab ship unloader (rope-trolley type)"}, "a": "B"}, {"u": 3, "q": "Regarding ship loaders at dry bulk terminals, which of the following statements is correct?", "o": {"A": "Fixed ship loaders have the widest working coverage and are most widely used at large dry bulk terminals.", "B": "Slewing ship loaders are classified into side-tipping and rotary types.", "C": "The mobile continuous ship loader, characterized by traveling along the quay, has wide working coverage and high flexibility and is currently the most widely used type.", "D": "Fixed ship loaders have been completely phased out at large dry bulk terminals due to low efficiency."}, "a": "C"}, {"u": 3, "q": "Regarding the selection of hoisting machinery at general cargo terminals, which of the following statements is incorrect? crest elevation=.", "o": {"A": "For small-batch and multi-batch cargo handling, a tire crane should be prioritized, or it can be used to assist portal cranes in auxiliary operations.", "B": "When water-land intermodal truck-to-ship direct transfer operations are required, portal cranes should be given priority.", "C": "For large-batch, heavy, and long-piece cargo handling and storage in the yard, a tire crane should be given priority.", "D": "When cargo types vary frequently, a multi-purpose portal crane is recommended, as it can adapt to different cargo types by changing spreaders."}, "a": "C"}, {"u": 3, "q": "Regarding the core process flow of container terminal handling technology, which of the following statements is correct?", "o": {"A": "Yard operations only participate during gate container pick-up and are not involved in the unloading process.", "B": "Horizontal transport operations are mainly responsible for vertical handling between the ship and the shore.", "C": "The core process of a container terminal is the complete \"Ship ⇌ Yard ⇌ Gate\" flow, consisting of three major links: ship-to-shore handling, horizontal transport, and yard operations.", "D": "The core process of a container terminal consists of two major links — ship-to-shore handling and horizontal transport — while yard operations are only auxiliary."}, "a": "A"}, {"u": 3, "q": "Regarding the comparison between rail-mounted gantry cranes (RMGs) and rubber-tyred gantry cranes (RTGs), which of the following statements is incorrect?", "o": {"A": "An RMG can stack 8–15 rows of containers plus a truck lane within its span; the typical span of an RTG covers 6 rows of containers plus 1 truck lane.", "B": "An RTG can transfer between different yard blocks for flexible operation.", "C": "The stacking height of an RMG is typically 4–5 tiers, lower than the 6–7 tiers of an RTG.", "D": "RMGs run on ground rails with steel wheels and are electrically driven; RTGs run on rubber tires and are power-driven."}, "a": "C"}, {"u": 3, "q": "Regarding the \"Wagon → Ship\" direct transfer operation at dry bulk terminals, which of the following statements is correct?", "o": {"A": "Direct transfer eliminates the yard as an intermediate link — cargo is directly loaded onto the ship via belt conveyors after wagon unloading.", "B": "The handling efficiency of direct transfer is higher than that of indirect transfer.", "C": "Direct transfer is the most routinely used operation mode at dry bulk terminals.", "D": "Direct transfer does not require car dumpers or ship loaders."}, "a": "D"}, {"u": 3, "q": "Regarding horizontal transport equipment at container terminals, which of the following statements is correct?", "o": {"A": "Straddle carriers are used only for horizontal transport and do not have yard stacking capability.", "B": "Automated guided vehicles (AGVs) are the most efficient horizontal transport equipment.", "C": "All container horizontal transport equipment uses magnetic-pin positioning and navigation.", "D": "Internal container trucks are responsible for container reshuffling and stacking operations within the yard."}, "a": "B"}, {"u": 3, "q": "Regarding the handling process flow at general cargo terminals, which of the following statements is correct?", "o": {"A": "The indirect transfer process at general cargo terminals is: horizontal handling machinery lifts cargo from the ship hold → hoisting machinery transports it to the warehouse/yard → stacking.", "B": "Since direct transfer eliminates secondary handling, it simultaneously saves handling time and ship turnaround time in port.", "C": "In ship-to-ship lightering operations, the outboard lightering must use shore-based hoisting machinery to unload cargo and then transport it horizontally to the loading berth.", "D": "The complete unloading process (indirect transfer) at general cargo terminals is: portal crane lifts cargo from the ship hold → tractor-trailer transports it to the warehouse/yard → gantry crane or forklift unloads and stacks it in the yard."}, "a": "A"}, {"u": 3, "q": "Regarding unloading machinery for railway wagons at dry bulk terminals, which of the following statements is incorrect?", "o": {"A": "The car dumper has the highest operating efficiency among all wagon-unloading methods.", "B": "The car dumper is currently the most common wagon-unloading equipment at dry bulk terminals and has achieved automatic control.", "C": "Chain bucket wagon unloaders and screw wagon unloaders are still widely used at large specialized dry bulk terminals due to their relatively high efficiency.", "D": "Car dumpers are classified by tipping mode into side-tipping and rotary types; newly-built large terminals mostly adopt triple-car or quadruple-car dumpers."}, "a": "A"}, {"u": 3, "q": "Regarding marine loading arms, which of the following statements is correct?", "o": {"A": "Loading arms can only be operated manually and cannot achieve automated control.", "B": "Loading arms are made of rubber hoses, with fixed rigid connections.", "C": "Loading arms have low investment cost and are suitable only for small oil terminals.", "D": "The diameter and number of loading arms increase with the terminal tonnage class."}, "a": "B"}, {"u": 3, "q": "In modern container terminal planning, selection of handling equipment is strictly role-specific. Which statement best describes the operational domains of Quayside Container Cranes (QCCs) and Rail-Mounted Gantry Cranes (RMGs)?", "o": {"A": "Both QCCs and RMGs serve vessel operations, differing in mobility features.", "B": "QCCs are dedicated to ship-shore operations at berths, while RMGs are used for yard handling.", "C": "QCCs transport containers to storage blocks, while RMGs perform vessel loading/unloading at berths.", "D": "QCCs handle vessel-to-shore transfers and yard stacking, while RMGs serve inter-terminal transfers."}, "a": "A"}, {"u": 3, "q": "Among the following container yard equipment, which one can both flexibly transfer between different yard blocks and stack loaded containers 6–7 tiers high?", "o": {"A": "Rubber-tyred gantry crane (RTG)", "B": "Reach stacker", "C": "Straddle carrier", "D": "Rail-mounted gantry crane (RMG)"}, "a": "C"}, {"u": 3, "q": "Which of the following is NOT a functional area involved in the Ro-Ro terminal handling process flow?", "o": {"A": "Ro-Ro handling area", "B": "Car dumper shed", "C": "Consolidation area", "D": "Storage yard"}, "a": "C"}, {"u": 3, "q": "In the unloading operation at a container terminal, which equipment is responsible for horizontal transport between the quay apron and the yard?", "o": {"A": "Rubber-tyred gantry crane (RTG)", "B": "Reach stacker", "C": "Internal container truck", "D": "Quayside container crane (QC)"}, "a": "B"}, {"u": 4, "q": "A port's land area is divided into three major zones. Within a container terminal's land area, which of the following facility groupings BEST matches the 'cargo handling zone + auxiliary operation zone + reserved development land' three-zone classification?", "o": {"A": "Cargo handling zone: storage yard, warehouse, railway line; Auxiliary zone: fire station, substation, operation section office; Reserved land: vacant land set aside for future yard expansion", "B": "Cargo handling zone: garage, tool house, repair shop; Auxiliary zone: yard, warehouse, railway; Reserved land: all green space within the port", "C": "Cargo handling zone: all buildings and structures within the port; Auxiliary zone: all open-air spaces; Reserved land: the anchorage area", "D": "Cargo handling zone: breakwater and navigation channel; Auxiliary zone: wharf and yard; Reserved land: the entire turning basin"}, "a": "A"}, {"u": 4, "q": "Regarding the concept of the optimal number of berths in port planning, which of the following statements is correct?", "o": {"A": "The optimal number of berths is the number that maximizes berth utilization (approaching 100%), thereby maximizing the use efficiency of terminal facilities", "B": "The optimal number of berths is the number that minimizes the sum of port construction and operation costs and vessel waiting loss costs, while meeting the design throughput requirement", "C": "The optimal number of berths is the number that makes the average vessel waiting time zero, ensuring vessels can berth immediately upon arrival without waiting", "D": "The optimal number of berths is the number that minimizes port construction and operation costs, minimizing the port operator's investment burden"}, "a": "B"}, {"u": 4, "q": "Regarding the correspondence between open-type terminal layout forms and applicable cargo types, which of the following is correct?", "o": {"A": "Butterfly mooring layout is applicable to liquid bulk cargoes such as crude oil, refined oil, and LNG", "B": "Butterfly mooring layout can also be used for dry bulk cargoes such as coal and ore", "C": "Open-type terminals have wide water areas and good water depth conditions, making them very suitable for container terminals", "D": "Both liquid bulk and dry bulk terminals need to choose between straight-type and butterfly mooring layouts based on natural conditions"}, "a": "A"}, {"u": 4, "q": "Regarding the impact of unified berth group scheduling on port efficiency, which of the following statements is correct?", "o": {"A": "The core of unified berth group scheduling is to assign berths of different tonnages to different shipping companies for independent operation and management, reducing handling costs through internal competition", "B": "The essence is improving service level by pooling and utilizing the scattered idle time of berths across zones", "C": "Unified berth group scheduling concentrates the vessel arrival rate λ onto fewer berths to increase single-berth utilization ρ, minimizing port operating costs", "D": "Unified scheduling is applicable to general cargo and container terminals; for dry bulk terminals, due to uniform cargo type and fixed vessel size, the effect of unified scheduling is not significant"}, "a": "B"}, {"u": 4, "q": "In the straight-type layout of an open-type liquid bulk terminal, the arrangement characteristics and main advantages of breasting dolphins, mooring dolphins, and the loading/unloading platform are.", "o": {"A": "Some mooring dolphins are set back relative to the quay front, forming a butterfly shape, to resist stronger transverse loads", "B": "The breasting dolphins, mooring dolphins, and loading/unloading platform are arranged in a straight line, allowing vessels to be served on both sides of the terminal", "C": "The dolphins are arranged separately and independently, suitable for berthing a single large vessel", "D": "The platform is set back to avoid vessel impact, suitable for resisting transverse loads from wind, waves, and currents"}, "a": "B"}, {"u": 4, "q": "According to the code commentary, the overtopping control criterion and the structural force control criterion for quay top elevation each have their applicable scenarios. Which of the following statements is correct?", "o": {"A": "Well-sheltered piled deck terminals generally have their elevation determined by the overtopping criterion", "B": "Well-sheltered caisson terminals generally have their elevation determined by the structural force criterion", "C": "Open-type caisson terminals generally have their elevation determined by the structural force criterion", "D": "Open-type dolphin terminals generally have their elevation determined by the structural force criterion"}, "a": "A"}, {"u": 4, "q": "The controlling factor for the allowable wave height for cargo handling at the berth is.", "o": {"A": "Operating conditions of harbor tugs", "B": "Conditions for pilot boarding and disembarkation", "C": "Vessel motion magnitude under wave action and its impact on handling equipment", "D": "Terminal structural form and water area conditions"}, "a": "C"}, {"u": 4, "q": "The mooring line breakage accident at the Friendship Port in Mauritania was primarily caused by which type of wave?", "o": {"A": "High wind waves", "B": "Long-period waves of moderate height", "C": "Tsunami", "D": "Swells"}, "a": "B"}, {"u": 4, "q": "Among the following layout forms, the one that is open-type, does not require breakwater protection, and is mostly adopted for large bulk carriers and oil tankers is.", "o": {"A": "Alongshore (quay) type layout", "B": "Pier (finger) type layout", "C": "Dredged basin layout", "D": "Offshore island type layout"}, "a": "D"}, {"u": 4, "q": "Regarding the relationship between the k value in the butterfly mooring berth length formula Lb = kL and current conditions, which of the following descriptions is correct? k.", "o": {"A": "k is generally taken as 1.1–1.3, and when alongshore current is dominant, k can be appropriately reduced", "B": "k is generally taken as 1.4–1.5, and when alongshore current is dominant, k can be appropriately reduced", "C": "k is generally taken as 1.1–1.3, and when alongshore current is dominant, k can be appropriately increased", "D": "k is generally taken as 1.4–1.5, and when alongshore current is dominant, k can be appropriately reduced"}, "a": "C"}, {"u": 4, "q": "For a river port located in a relatively narrow river reach with high vessel traffic density, low flow velocity, and low sediment concentration, the most suitable layout form to avoid impacting the main navigation channel is.", "o": {"A": "Alongshore (quay) type layout", "B": "Pier (finger) type layout", "C": "Dredged basin layout", "D": "Offshore island type layout"}, "a": "C"}, {"u": 4, "q": "According to Article 5.4.8 of the Design Code of General Layout for Sea Ports (JTS 165–2025), when the quay top elevation is determined by the basic overtopping control criterion, the freeboard (.", "o": {"A": "Generally, the crest elevation of H4% with a 10–15 year return period may be taken; for well-sheltered terminals, 1.0 m – 2.0 m may be taken", "B": "Generally, the crest elevation of H4% with a 2–5 year return period may be taken; for well-sheltered terminals, 0.5 m – 1.0 m may be taken", "C": "Generally, the crest elevation of H1% with a 50-year return period may be taken; for open-type terminals, 0.5 m – 1.0 m", "D": "Generally, the crest elevation of H13% with a 2-year return period may be taken; for well-sheltered terminals, 2.0 m – 3.0 m"}, "a": "A"}, {"u": 4, "q": "Compared with the straight-type layout, the core advantage of the butterfly mooring layout is.", "o": {"A": "Both sides of the terminal can simultaneously serve multiple vessels, increasing berth utilization", "B": "The berth length is shorter, saving shoreline", "C": "The mooring dolphins are set back, enabling resistance to stronger transverse loads from wind, waves, and currents, suitable for a single large vessel", "D": "Lower construction cost and simpler construction"}, "a": "C"}, {"u": 4, "q": "Regarding the criteria for determining the timing of new port capacity addition, which of the following statements is correct?", "o": {"A": "When berth utilization ρ reaches 0.8, berths should be added", "B": "AWT/AST should be the core decision indicator for berth addition timing; high berth utilization ρ does not necessarily imply high AWT/AST", "C": "For every 20% increase in port throughput, one additional berth should be built", "D": "AWT/AST and berth utilization ρ always correspond one-to-one and change synchronously, so using ρ is more intuitive"}, "a": "B"}, {"u": 4, "q": "According to Articles 5.4.8–5.4.9 of the Design Code of General Layout for Sea Ports (JTS 165–2025), regarding the calculation method for quay top elevation, which of the following statements is correct?", "o": {"A": "Well-sheltered piled beam-slab terminals generally adopt the freeboard control criterion, requiring that the deck not be flooded to prevent structural damage", "B": "Well-sheltered caisson terminals generally adopt the structural force control criterion, requiring structural stability under design high water level and design wave conditions", "C": "For butterfly mooring terminals, if the mooring and breasting dolphins adopt circular caisson structures, their top elevation shall be determined by the overtopping control criterion, and can be appropriately reduced after justification", "D": "For butterfly mooring terminals, if the working platform adopts a piled dolphin structure, its top elevation is generally determined by the overtopping control criterion"}, "a": "C"}, {"u": 4, "q": "For a container terminal area with multiple berths arranged continuously, in order to enhance operational efficiency and achieve flexible equipment deployment, the most suitable layout form is.", "o": {"A": "Offshore island type layout", "B": "Pier (finger) type layout", "C": "Alongshore (quay) type layout", "D": "Trestle type layout"}, "a": "C"}, {"u": 4, "q": "During cargo handling operations at a terminal, the vessel motion magnitude at which of the following locations is more important?", "o": {"A": "Vessel's center of gravity", "B": "Bow", "C": "Cargo handling point on the vessel", "D": "Stern"}, "a": "C"}, {"u": 4, "q": "The most fundamental factor affecting the cargo handling efficiency of vessels at the quay front is.", "o": {"A": "Wind speed", "B": "Current velocity", "C": "Vessel motions", "D": "Tides"}, "a": "C"}, {"u": 4, "q": "The controlling factor for the allowable wave height for vessel mooring at the berth is.", "o": {"A": "Vessel motions", "B": "Type of handling equipment and efficiency requirements", "C": "Operating conditions of harbor tugs", "D": "Cargo type and vessel type"}, "a": "A"}, {"u": 4, "q": "The methods for determining the berth length of open-type terminals differ between the straight-type layout and the butterfly mooring layout. Which of the following comparisons is correct?", "o": {"A": "Straight-type: Lb = L + 2d (where d can be taken as the design vessel width for open-type); butterfly: Lb = kL (k = 1.1–1.3). The two use different formula systems and parameters", "B": "Both straight-type and butterfly use Lb = L + 2d, differing in the value of d", "C": "Straight-type uses Lb = L + 2d, and butterfly also uses the same formula, but d must be taken as the design vessel width", "D": "Both straight-type and butterfly use Lb = kL, differing only in the range of k"}, "a": "A"}, {"u": 4, "q": "In an artificially sheltered water area where shoreline resources are relatively limited, the most suitable layout form for accommodating a large number of multi-purpose berths within a limited water area is.", "o": {"A": "Alongshore (quay) type layout", "B": "Pier (finger) type layout", "C": "Layout along the inner side of breakwater", "D": "Trestle type layout"}, "a": "B"}, {"u": 4, "q": "The layout form in which the quay line is roughly parallel to or at a small angle with the natural shoreline is.", "o": {"A": "Pier (finger) type layout", "B": "Alongshore (quay) type layout", "C": "Dredged basin layout", "D": "Offshore island type layout"}, "a": "B"}, {"u": 4, "q": "Regarding the layout of liquid bulk cargo terminals, which of the following statements is correct?", "o": {"A": "Should be located near the city center to facilitate pipeline corridor connections; breasting dolphin spacing in butterfly layout is 0.5–0.6 times the design vessel length; fire separation distance between tank farm and quay front is not less than 100 m", "B": "Should be located far from the city with enclosed layout; breasting dolphin spacing in butterfly layout is 0.3–0.4 times the design vessel length; fire separation distance between tank farm and quay front is not less than 50 m", "C": "Should be located far from the city with enclosed layout; breasting dolphin spacing is 0.1–0.2 times the design vessel length; fire separation distance is not less than 30 m", "D": "Should preferably be located far from the city; breasting dolphin spacing is 0.4–0.5 times the design vessel length; single point mooring (SPM) is applicable to nearshore waters with depth less than 10 m"}, "a": "B"}, {"u": 4, "q": "Container terminals are not suitable for trestle-type layout, while dry bulk and liquid bulk terminals can adopt it. The fundamental reason for this difference is.", "o": {"A": "Container vessels have much larger tonnage than bulk carriers, and trestle structures lack sufficient load-bearing capacity", "B": "Containers are transported by discrete trucks such that increased distance significantly raises vehicle allocation and operating costs; dry bulk and liquid bulk use belt conveyors or pipelines for continuous transport and are insensitive to distance", "C": "Container terminals require front yards close to the quay, and trestle-type layout would split the yard", "D": "Dry bulk terminals do not require front yards and can function without a yard"}, "a": "B"}, {"u": 4, "q": "Regarding the role of quantitative mathematical models (such as M/M/S queuing theory) in determining the optimal number of berths, which of the following statements is correct?", "o": {"A": "The optimal number of berths can be determined entirely from model results, because queuing theory models provide an exact solution minimizing total social cost", "B": "The optimal number of berths can be determined entirely from model results, because the model already incorporates the economic interests of both port and shipping parties through cb and cs", "C": "Model results cannot be fully relied upon, because model assumptions deviate from actual vessel arrival patterns; therefore, engineering experience and expert judgment should primarily determine the optimal number of berths", "D": "Model results cannot be fully relied upon, because the model only provides a quantitative economic analysis from port operating costs and vessel waiting losses, and actual decision-making must also comprehensively consider service level constraints, throughput forecast uncertainty, shoreline resource limitations, collection and distribution system capacity, and strategic positioning"}, "a": "D"}, {"u": 4, "q": "Regarding the comparison between improving handling efficiency and adding berths as two approaches to capacity enhancement, which of the following statements is correct?", "o": {"A": "The two approaches have the same effect; the one with a shorter construction period should be selected first", "B": "The total social cost of the efficiency improvement approach is lower than that of the berth addition approach, and it should be adopted preferentially", "C": "Efficiency improvement is economically inferior to berth addition", "D": "The efficiency improvement path is ineffective at improving service level"}, "a": "B"}, {"u": 4, "q": "According to Article 5.4.8 of the Design Code of General Layout for Sea Ports (JTS 165–2025), when the quay top elevation is determined by the structural force control criterion, the calculation method uses a certain design water level + wave crest elevation + freeboard. Specifically.", "o": {"A": "Design high water level, H1% with a 50-year return period, freeboard ΔF = 0 m – 1.0 m", "B": "Design high water level, H4% with a 10–15 year return period, freeboard ΔF = 1.0 m – 2.0 m", "C": "Extreme high water level, H1% with a 50-year return period, freeboard ΔF = 0 m – 1.0 m", "D": "Extreme high water level, H1% waves with a 50-year return period, freeboard ΔF = 0 m"}, "a": "C"}, {"u": 4, "q": "Regarding the land-side layout of dry bulk cargo terminals, which of the following statements is correct?", "o": {"A": "The yard should be l
