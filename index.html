 "a": "B"}, {"u": 2, "q": "Sediment transport characteristics surveys are only used for estimating channel and basin siltation rates; due to the complexity of sediment movement, they have no direct impact on port site selection, wharf structural type selection, or layout planning.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 2, "q": "Cargo throughput is affected by the traffic demand of the hinterland and the number of calling ships; at the same time, port facility efficiency (or port capacity) may also influence cargo throughput.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 2, "q": "A port's wind rose shows that the maximum wind speed from all directions during the observation period is 28 m/s. Since this value comes from actual observation and is reliable, it can be used as the design wind speed for port marine structures.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 2, "q": "DHWL and DLWL primarily consider astronomical tides and largely disregard meteorological factors. Therefore, before performing cumulative frequency statistics, storm surge/setdown components should first be removed from the measured tidal data to ensure the resulting DHWL and DLWL reflect \"pure astronomical tide\" water levels.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 2, "q": "A 100,000-tonne class bulk carrier berth, with loading/unloading equipment designed for 100,000-tonne class vessels, can only accommodate 100,000-tonne class bulk carriers from a professional standpoint. 10.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 2, "q": "Expert judgment methods (such as the Delphi method and scenario analysis) are highly subjective, with results varying from person to person, lacking objective confidence intervals, and having poor reliability for long-term forecasting. Delphi.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 2, "q": "For a berth of a given class, the tonnage and dimensions of the actual calling vessels can be precisely determined.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 2, "q": "Although LNG carriers and container ships transport entirely different cargoes, they use the same unit for tonnage classification, both being classified by DWT (deadweight tonnage). LNG.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 2, "q": "A fully loaded vessel experiences greater wind forces than a vessel in ballast condition; therefore, fully loaded vessels are more difficult to maneuver under strong wind conditions.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 2, "q": "Using the maximum wind speed from each direction as shown in the wind rose for design is theoretically safer than using the standard design wind speed.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 2, "q": "Estuarine areas are often the most severe sediment deposition zones, caused by the combined effects of seawater backwater reducing flow velocity, flocculation and settling of suspended sediment upon encountering saline water, and deposition of sediment transported from the open sea.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 2, "q": "The difference between the \"cumulative frequency of high (low) tide level method\" and the \"duration cumulative frequency method\" is: the former uses each high (or low) tide level as the statistical sample, while the latter uses the 8,760 hourly tide levels throughout the year.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 2, "q": "The textbook states that the cross-wind force on vessels is far greater than the along-ship wind force. Therefore, to reduce the effect of wind on berthing operations, the wharf berth axis should be as perpendicular as possible to the prevailing wind direction.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 2, "q": "For a port with a 100,000 DWT design vessel (half-speed inertial stopping distance ≈ 980 m), the port operation rules stipulate that operations cease when visibility drops below 1,000 m. On a day with measured visibility of 950 m, a senior pilot with 30 years of experience claims it is safe to guide a vessel of the same tonnage into port. According to the \"inertial distance compatible with visibility distance\" principle, should port dispatch respect the pilot's professional judgment and allow the vessel to enter?", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 2, "q": "Mean sea level can be accurately determined using only 1 year of continuous hourly tidal observation data.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 2, "q": "For a port with a design representative vessel of 100,000 DWT, the emergency stopping inertial distance at half speed is approximately 980 m. If the measured visibility on a given day is 800 m, according to the principle that \"the inertial stopping distance must be compatible with the visibility distance upon detecting a hazard,\" vessels should not navigate in the port area and channels that day, and corresponding fog days should be deducted from annual operable days.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 2, "q": "The core idea of the \"Reserved Design Vessel\" strategy is to build all port fixed facilities (wharf structures, access channels, anchorages) at once to accommodate the largest possible future vessel type, while mobile and upgradable equipment such as loading/unloading machinery is designed for the current calling vessel type to improve economic efficiency.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 2, "q": "From the perspective of transport, storage conditions, and handling technology, cargo transported through ports can be classified into general/break-bulk cargo, dry bulk cargo, liquid bulk cargo, and containerizable cargo.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 2, "q": "In port cargo throughput statistics, when 1 tonne of cargo is unloaded from Ship A and directly loaded onto Ship B, it is counted as 1 tonne in the throughput statistics.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 2, "q": "The cross-wind force acting on a vessel is far greater than the along-ship wind force; therefore, when selecting wharf orientation and channel axis, they should form the smallest possible angle with the prevailing and strong wind directions.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 2, "q": "Extreme High Water Level (EHWL) and Design High Water Level (DHWL) have the same application scenario in wharf deck elevation calculation; both are used to determine the wharf deck elevation under serviceability conditions.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 2, "q": "Both Extreme High Water Level (EHWL) and Extreme Low Water Level (ELWL) for sea ports adopt a 50-year return period, derived by fitting a continuous annual extreme tidal level series of no less than 20 years to an extreme-value type I (Gumbel) or Pearson type III distribution.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 2, "q": "The land-side depth of a port area must reserve development space based on cargo type characteristics. Container terminals, with dense handling equipment and large stacking requirements, generally require greater land-side depth than general cargo terminals.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 2, "q": "The port engineering zero point in China uniformly adopts the Yellow Sea Datum 1956.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 2, "q": "A port has only 6 months of hourly tidal observation data (covering summer through autumn). Cumulative frequency statistics can be performed directly on these 6 months of data, taking high-tide cumulative frequency 10% as DHWL and low-tide cumulative frequency 90% as DLWL.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 2, "q": "In natural conditions surveys for ports, the mean wind speed is calculated using a 1-hour average for determining the prevailing wind direction; the maximum gust wind speed is calculated using a 10-minute average for determining the strong wind direction.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 3, "q": "The container terminal unloading process is: \"QC lifts containers to the quay apron → horizontal transport equipment carries them to the yard → yard machinery unloads and stacks them.\" The loading process runs in the opposite direction, but the equipment configuration at each link is the same.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 3, "q": "The main function of a dry bulk transshipment terminal is to realize water-to-water transfer, and its typical process flow is: Unloading → Yard → Loading, with all links connected by the belt conveyor system.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 3, "q": "When selecting hoisting machinery at general cargo terminals, if cargo types vary frequently, a multi-purpose portal crane is recommended because it can handle containers, general cargo, and dry bulk cargo by changing spreaders.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 3, "q": "The unloading operation at a liquid bulk terminal should make full use of the oil tanker's own pump pressure for oil transfer. A booster pump can be installed to assist when the pipeline is long or the storage tank is far from the berth.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 3, "q": "Even when direct transfer is adopted as the main operation mode at a general cargo terminal, a certain amount of yard area and yard handling machinery must still be provided to deal with situations where trucks and ships cannot be synchronized.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 3, "q": "The Ro-Ro terminal handles cargo by vehicles driving on and off the ship, which is a fundamentally different handling mode from the traditional Lift-on/Lift-off (Lo-Lo) terminal that uses hoisting machinery for vertical lifting between the ship and the shore. AWT/AST<0.1=.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 3, "q": "Although straddle carriers combine both horizontal transport and yard stacking functions and can solve the coupling and waiting problem between quayside cranes and yard cranes, they are rarely used at container terminals in China.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 3, "q": "Rail-mounted gantry cranes (RMGs) are more energy-efficient, more environmentally friendly, and have a lower failure rate than rubber-tyred gantry cranes (RTGs), but they are less mobile than RTGs. Due to their high positioning accuracy and ease of automation, RMGs are a relatively ideal yard machinery type for automated container terminals. allowable wave height=.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 3, "q": "In port handling technology classification, forklift trucks belong to hoisting machinery rather than horizontal handling machinery.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 3, "q": "The belt conveyor is the main horizontal transport equipment connecting all links of the handling system at dry bulk terminals, and its commonly used belt speed range is 0.8–5.0 m/s.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 3, "q": "When selecting ship-to-shore handling equipment at dedicated container terminals, one can flexibly choose between quayside container cranes (QCs) and portal cranes equipped with container spreaders according to throughput volume.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 4, "q": "The alongshore (quay) type layout occupies a relatively short shoreline length per berth and is the most shoreline-efficient layout when shoreline resources are limited.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 4, "q": "A container terminal and an adjacent dry bulk terminal belong to the same port group. The group plans to uniformly configure berths to the high standard of AWT/AST ≤ 0.1, as used for the container terminal. Although uniformly configuring berths to a high standard will increase construction investment, it can comprehensively improve port service levels and attract more cargo sources, which is beneficial to the group's overall long-term interests.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 4, "q": "Both large dry bulk terminals and liquid bulk terminals can adopt the butterfly (dolphin) mooring arrangement in the trestle-type layout, connected to the shore via handling equipment on the trestle or subsea pipelines.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 4, "q": "The optimal number of berths is the number that minimizes the sum of port construction and operation costs and vessel waiting losses. During the determination process, as the number of berths increases, port costs increase while vessel waiting costs decrease; the number S corresponding to the lowest point of the total cost curve is the optimal number of berths.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 4, "q": "The adoption of a 4% wave train cumulative frequency as the standard for the allowable wave height for cargo handling at berths is to maintain consistency with the statistical convention of measured data from China's coastal wave observation stations, facilitating direct use of measured data to derive wave heights inside the harbor. H4%.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 4, "q": "In butterfly mooring terminals, the breasting dolphins and the loading/unloading platform should be independently arranged, primarily to protect the handling equipment on the platform from vessel impact forces.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 4, "q": "A general cargo terminal currently has berth utilization ρ = 0.67 and AWT/AST = 0.45, approaching the limit point of 0.5. If the handling efficiency is increased from 2,000 t/(d·berth) to 3,000 t/(d·berth), ρ drops to 0.44, AWT/AST improves significantly, and 3 berths can meet the service level requirement without adding berths. This demonstrates that, provided technical conditions permit and cargo sources are stable, improving handling efficiency is more economical than adding berths. ρ=0.67, AWT/AST=0.45.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 4, "q": "The allowable wave height for vessel mooring at the berth front refers to the wave height at which cargo handling operations can be conducted at the berth front.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 4, "q": "Large vessels are more sensitive to long-period waves (60 s – 120 s); even waves of moderate height can cause dangerous conditions.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 4, "q": "The allowable wave height for vessel mooring at the berth front generally does not exceed 2 m, and different cargo types and handling equipment correspond to different allowable mooring wave height limits.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 4, "q": "In the berth length formula Lb = kL for the butterfly mooring layout of open-type terminals, regardless of whether alongshore current or cross current is dominant at the berth front, the k value must be taken as a single value within the range 1.1–1.3 and must not be adjusted. k.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 4, "q": "A port simultaneously operates container liner services and dry bulk tramp services. Container liners should prioritize maintaining AWT/AST ≤ 0.1, while dry bulk tramp vessels can accept higher AWT/AST and berth utilization. Therefore, within the same port, differentiated efficiency adaptation strategies should be adopted for different vessel types.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 4, "q": "Because the dredged basin layout involves excavation landward, it has a significant impact on river flood discharge capacity.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 4, "q": "In river channels and estuaries, excessive extension of pier (finger) type layouts into the river will alter the original flow regime, easily cause erosion and sedimentation, and occupy channel width affecting navigation.", "o": {"A": "", "B": ""}, "a": "A"}, {"u": 4, "q": "A general cargo terminal, according to its current design, has AWT/AST = 0.08 and berth utilization ρ = 0.4. This indicates that the terminal has an excellent service level, the berth configuration is adequate and reasonable, and no adjustment to the number of berths is needed. AWT/AST=0.08, ρ=0.4.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 4, "q": "Offshore island-type terminals are located in deep water far from the shore. To ensure berthing tranquility conditions, breakwaters must be constructed for protection.", "o": {"A": "", "B": ""}, "a": "B"}, {"u": 5, "q": "When the calculated bottom elevation of the channel and turning basin is higher than that of the berth front water area, the berth front bottom elevation shall be adopted as the controlling value.", "o": {"A": "", "B": ""}, "a": "错"}, {"u": 5, "q": "In the harbor basin width formula for alongshore terminals, 1.5L corresponds to the core dimension required for the turning circle, and 1.0B corresponds to the width of the berth front water area.", "o": {"A": "", "B": ""}, "a": "错"}, {"u": 5, "q": "In the berth front water depth formula D=T+Z₁+Z₂+Z₃+Z₄, Z₁ is the minimum under-keel clearance, which mainly accounts for depth measurement errors, underwater obstacles, and the extra depth needed to reduce maneuvering difficulty.", "o": {"A": "", "B": ""}, "a": "错"}, {"u": 5, "q": "Single-point and multi-point mooring terminals connect vessels to the shore via subsea pipelines, and are especially suitable for constructing large crude oil terminals in areas with ample nearshore water depth and favorable channel dredging conditions.", "o": {"A": "", "B": ""}, "a": "错"}, {"u": 5, "q": "In the berth front water depth formula D=T+Z₁+Z₂+Z₃+Z₄, Z₃ represents the increased stern draft of the vessel, which accounts for the hull sinkage during navigation.", "o": {"A": "", "B": ""}, "a": "错"}, {"u": 5, "q": "The navigable depth refers to the distance from the theoretical lowest tide level to the top of the fluid mud layer.", "o": {"A": "", "B": ""}, "a": "错"}, {"u": 5, "q": "The harbor entrance should preferably be located beyond the critical depth of sediment movement. If placed outside the wave breaking zone, siltation can be significantly reduced. However, on muddy and silty coasts, a balance must still be struck between reduced siltation and the increased investment in breakwater construction.", "o": {"A": "", "B": ""}, "a": "对"}, {"u": 5, "q": "When the angle between the wave direction and the ship's longitudinal axis is 0 degrees, i.e., following sea or head sea, the wave-induced hull sinkage is minimal.", "o": {"A": "", "B": ""}, "a": "对"}, {"u": 5, "q": "Upgrading the efficiency of ship-to-shore handling equipment will definitely and significantly improve the overall service level of the terminal.", "o": {"A": "", "B": ""}, "a": "错"}, {"u": 5, "q": "The calculation of track band width does not need to consider wind speed.", "o": {"A": "", "B": ""}, "a": "错"}, {"u": 5, "q": "The crest elevation of a breakwater is directly related to whether wave overtopping is permitted: when essentially no overtopping is allowed, the required crest elevation is higher; when overtopping is permitted, the crest elevation may be lowered. Physical model tests may be necessary to determine the final elevation.", "o": {"A": "", "B": ""}, "a": "对"}, {"u": 5, "q": "Double-anchor mooring, such as standing moor or open moor, uses two anchors to limit the vessel's swinging range, thereby reducing the occupied water area compared with single-anchor mooring. However, anchoring and weighing operations are more complex, and when the wind direction changes frequently, the two chains may become fouled.", "o": {"A": "", "B": ""}, "a": "对"}, {"u": 5, "q": "The larger the harbor water area, the greater the tidal prism and siltation; therefore, the smaller the harbor water area, the better.", "o": {"A": "", "B": ""}, "a": "错"}, {"u": 5, "q": "The code simplifies the vessel navigation squat Z₀ by determining it from a chart based solely on vessel tonnage and speed, and this simplified method is applicable to all channel cross-section types.", "o": {"A": "", "B": ""}, "a": "错"}, {"u": 5, "q": "The value of Z₁ at the berth front shall be adjusted according to the design vessel tonnage: the larger the vessel, the greater the Z₁ value, so as to meet the maneuverability requirements of large-tonnage vessels.", "o": {"A": "", "B": ""}, "a": "错"}, {"u": 5, "q": "When a ship navigates in shallow water, the hull sinkage is related to ship speed but has nothing to do with the water depth-to-draft ratio h/d.", "o": {"A": "", "B": ""}, "a": "错"}, {"u": 5, "q": "In China's General Design Code for Sea Ports, the channel Z₁ adopts a dual-dimension approach based on both seabed material and vessel tonnage. The core reason is that larger vessels exhibit poorer maneuverability in shallow water and have larger condenser water intakes, thus requiring greater under-keel clearance.", "o": {"A": "", "B": ""}, "a": "对"}, {"u": 5, "q": "When the cross-current velocity increases, the wind and current drift angle γ increases, but the drift multiplier n decreases.", "o": {"A": "", "B": ""}, "a": "对"}, {"u": 5, "q": "The rheological method for determining navigable depth does not require field sampling and can be completed through theoretical calculation alone.", "o": {"A": "", "B": ""}, "a": "错"}, {"u": 5, "q": "The throughput capacity of a two-way channel is twice that of a one-way channel, so expanding a one-way channel to two-way can solve all channel bottleneck problems.", "o": {"A": "", "B": ""}, "a": "错"}, {"u": 5, "q": "The wind and current drift angle refers to the angle between the wind or current direction and the channel axis, reflecting the direction of the forces exerted by wind and current on vessels navigating within the channel.", "o": {"A": "", "B": ""}, "a": "对"}, {"u": 5, "q": "Anchorage water depth design must account for wave-induced vertical vessel motion. When the design wave height exceeds 2 m, additional wave allowance should be included. However, anchorages typically utilize areas with suitable natural water depth and are generally not artificially dredged, a key distinction from berths and channels in terms of depth maintenance.", "o": {"A": "", "B": ""}, "a": "对"}, {"u": 5, "q": "When the port berth utilization rate reaches above 90%, it indicates extremely high operational efficiency and optimal service level.", "o": {"A": "", "B": ""}, "a": "错"}, {"u": 5, "q": "For breakwaters with high protection requirements, the crest elevation cannot be simply taken as 1.0 times the design wave height under the essentially no overtopping criterion; it must also be determined through wave run-up calculations, with the overtopping discharge controlled within allowable limits.", "o": {"A": "", "B": ""}, "a": "对"}, {"u": 5, "q": "When the natural water depth outside the entrance is shallow and the approach channel is deeply dredged, the side slopes refract incident waves, concentrating wave energy toward both sides of the entrance and reducing the wave energy entering the harbor, which is favorable for harbor tranquility. The concentration of wave energy at the entrance, however, poses risks to vessel transit safety and must be addressed.", "o": {"A": "", "B": ""}, "a": "对"}, {"u": 5, "q": "On sandy coasts, the breakwater entrance should be located outside the wave breaking zone to prevent longshore sediment transport from entering the channel and basin. On muddy coasts, placing the entrance outside the breaking zone greatly reduces suspended sediment deposition, but the increased breakwater length and investment must be weighed. The strategies for both coast types share the same objective of reducing sediment ingress by avoiding the wave breaking zone, but they address different sediment transport modes.", "o": {"A": "", "B": ""}, "a": "对"}, {"u": 5, "q": "When the seabed is rocky, the bathymetric survey accuracy is high, so Z₁ may take a smaller value; for muddy seabeds where survey difficulties lead to greater uncertainty, Z₁ should take a larger value.", "o": {"A": "", "B": ""}, "a": "错"}, {"u": 5, "q": "The entire water area enclosed by breakwaters constitutes the harbor basin.", "o": {"A": "", "B": ""}, "a": "错"}, {"u": 5, "q": "The larger the water area inside the breakwater, the better.", "o": {"A": "", "B": ""}, "a": "错"}, {"u": 5, "q": "When the channel alignment intersects the prevailing current at a large angle, navigational safety can still be ensured through engineering measures. However, an oblique intersection with isobaths leads to persistent siltation costs. When the two principles conflict, giving priority to aligning perpendicular to isobaths is a reasonable engineering decision.", "o": {"A": "", "B": ""}, "a": "对"}, {"u": 5, "q": "Z₂ and Z₁ are conceptually different: Z₁ prevents bottom contact and Z₂ accounts for wave effects; therefore the code stipulates that they are determined independently without influencing each other.", "o": {"A": "", "B": ""}, "a": "错"}];

const QA = [{"u": 2, "q": "1.问答题How many tidal constituents are typically selected for a complete tidal harmonic analysis? How does the number of constituents differ under different accuracy requirements?【答案】分潮数量取决于精度：理论最低潮面13个（8天文+2长周期+3浅水），常规预报60~120个，高精度研究数百个", "hint": "【答案】分潮数量取决于精度：理论最低潮面13个（8天文+2长周期+3浅水），常规预报60~120个，高精度研究数百个"}, {"u": 2, "q": "2.问答题A coastal city plans to build a new 100,000 DWT berth primarily for coal export. Site investigation reveals: D₅₀ ≈ 0.05 mm, nearshore subaqueous slope ≈ 1:600, annual dominant wave direction SE, strong wave direction consistent with dominant wave, surfzone zone width ≈ 600 m. Operating experience from a neighboring port shows that after heavy wave events, the channel can be silted 2–3 m in a single storm.【答案】(1)粉砂质海岸，波浪掀沙+潮流输沙+骤淤；(2)长距离挡沙堤+短航道+备淤深度+应急疏浚；(3)泥沙优先于横流，乘憩流窗口避横流", "hint": "【答案】(1)粉砂质海岸，波浪掀沙+潮流输沙+骤淤；(2)长距离挡沙堤+短航道+备淤深度+应急疏浚；(3)泥沙优先于横流，乘憩流窗口避横流"}, {"u": 2, "q": "3.问答题(1) What do the graphics plotted at stations V1# through V6# represent? (2) During the planning phase, what is the minimum duration for short-term and long-term observation? (3) If station layout fails to cover the most relevant areas, what method is generally adopted?【答案】(1)海流矢量图/流场图；(2)短期≥25h，长期≥25d；(3)潮流数值模拟", "hint": "【答案】(1)海流矢量图/流场图；(2)短期≥25h，长期≥25d；(3)潮流数值模拟"}, {"u": 2, "q": "4.问答题Please explain the definitions and statistical methods for DHWL, DLWL, EHWL, and ELWL, and their primary application scenarios in port structural design. Present in tabular form.【答案】DHWL=高潮累积频率10%/DLWL=低潮累积频率90%/EHWL=50年一遇极值高水位/ELWL=50年一遇极值低水位", "hint": "【答案】DHWL=高潮累积频率10%/DLWL=低潮累积频率90%/EHWL=50年一遇极值高水位/ELWL=50年一遇极值低水位"}, {"u": 2, "q": "5.问答题A coastal city plans to build a new deep-water port. Three forecast methods show significant differences: time-series 12M t, causal analysis 15.5M t, Delphi median 13.5M t (IQR 11-16M t). (1) Analyze applicability and bias of each method. (2) Synthesize results. (3) Determine Phase I design throughput.【答案】(1)时间序列法偏低/因果分析法偏高/德尔菲法综合判断；(2)推荐1300~1400万t；(3)一期取1000~1100万t", "hint": "【答案】(1)时间序列法偏低/因果分析法偏高/德尔菲法综合判断；(2)推荐1300~1400万t；(3)一期取1000~1100万t"}, {"u": 2, "q": "6.问答题There is a dynamic relationship between cargo throughput and port capacity. Please describe the port operational status corresponding to three relationships, and analyze the problems when throughput exceeds capacity.【答案】吞吐量<通过能力=顺畅但利用率低；≈通过能力=满负荷但弹性不足；>通过能力=超负荷，排队/货源流失/安全风险", "hint": "【答案】吞吐量<通过能力=顺畅但利用率低；≈通过能力=满负荷但弹性不足；>通过能力=超负荷，排队/货源流失/安全风险"}, {"u": 2, "q": "7.问答题What causes astronomical tides? What are spring tides and neap tides?【答案】月球太阳引潮力；大潮=朔望叠加，小潮=上弦下弦相消", "hint": "【答案】月球太阳引潮力；大潮=朔望叠加，小潮=上弦下弦相消"}, {"u": 2, "q": "8.问答题A port currently has a 100,000-tonne berth, considering upgrading to 300,000 tonnes. Given natural conditions, economic conditions, 3% annual demand growth, competitor status, etc. (1) Factors for determining calling vessel type. (2) Phased implementation plan. (3) \"Reserved Design Vessel\" strategy.【答案】(1)自然/经济/竞争/统计四层因素；(2)一期结构预留+航道分期疏浚；(3)水工结构一次建成+辅设施分期升级", "hint": "【答案】(1)自然/经济/竞争/统计四层因素；(2)一期结构预留+航道分期疏浚；(3)水工结构一次建成+辅设施分期升级"}, {"u": 2, "q": "9.问答题Describe the overall framework of port planning survey and analysis.【答案】经济社会调查定功能/吞吐量/船型，自然条件调查定选址/布置/设计；布局规划重经济社会，总体规划重自然条件", "hint": "【答案】经济社会调查定功能/吞吐量/船型，自然条件调查定选址/布置/设计；布局规划重经济社会，总体规划重自然条件"}, {"u": 2, "q": "10.问答题How is the design wind speed determined in port engineering? Why not directly use the maximum observed wind speed from a wind rose?【答案】≥20年年最大10min平均风速序列→极值I型分布→50年一遇值；实测最大值重现期不确定", "hint": "【答案】≥20年年最大10min平均风速序列→极值I型分布→50年一遇值；实测最大值重现期不确定"}, {"u": 2, "q": "11.问答题Briefly describe the conceptual difference between strong wind direction and prevailing wind direction, and explain their influences on berth axis, channel axis, and breakwater entrance.【答案】强风向=最大风速对应/常风向=频率最高；泊位优先减小与强风向夹角，航道粉砂质海岸优先服从泥沙约束", "hint": "【答案】强风向=最大风速对应（极值）/常风向=频率最高（适中）；泊位优先减小与强风向夹角，航道粉砂质海岸优先服从泥沙约束"}, {"u": 2, "q": "12.问答题Briefly describe the differences between \"molded dimensions\" and \"actual (extreme) dimensions\" of vessels. What beam parameter is adopted in the Design Code and why? What beam should be used in ship lock and dry dock design?【答案】规范用型宽（国际标准+富裕量覆盖差值）；船闸/船坞用全宽", "hint": "【答案】规范用型宽（国际标准+富裕量覆盖差值）；船闸/船坞用全宽（净空紧凑不可依赖富裕量）"}, {"u": 2, "q": "13.问答题Astronomical tides can be classified by tidal form into four types. Describe the main characteristics and corresponding tidal periods.【答案】潮形系数F=(K₁+O₁)/(M₂+S₂)；F≤0.25正规半日潮/0.25~1.5不正规半日潮/1.5~3.0不正规全日潮/F>3.0正规全日潮", "hint": "【答案】潮形系数F=(K₁+O₁)/(M₂+S₂)；F≤0.25正规半日潮/0.25~1.5不正规半日潮/1.5~3.0不正规全日潮/F>3.0正规全日潮"}, {"u": 2, "q": "14.问答题What is tidal harmonic analysis? Write the mathematical expression. What are harmonic constants and their engineering applications?【答案】F(t)=A₀+ΣAₙcos(ωₙt-φₙ)；调和常数=Aₙ振幅+φₙ迟角；用途：潮汐预报/设计水位/理论最低潮面", "hint": "【答案】F(t)=A₀+ΣAₙcos(ωₙt-φₙ)；调和常数=Aₙ振幅+φₙ迟角；用途：潮汐预报/设计水位/理论最低潮面"}, {"u": 2, "q": "15.问答题What is a lunar day? What is a solar day? How long is a lunar day? Why does the lunar day differ from the solar day?【答案】太阳日=24h，太阴日≈24h50min；差异因月球公转方向与地球自转相同", "hint": "【答案】太阳日=24h，太阴日≈24h50min；差异因月球公转方向与地球自转相同"}, {"u": 2, "q": "16.问答题Please explain the definitions, measurement attributes, and applicable vessel type ranges of DWT and GT. Why do LNG carriers, passenger ships, and Ro-Ro car carriers use GT rather than DWT?【答案】DWT=载重重量吨，GT=容积吨；容积型船用GT因DWT严重低估规模", "hint": "【答案】DWT=载重重量吨（散货/油船/集装箱），GT=容积吨（LNG/客船/汽车船）；容积型船用GT因DWT严重低估规模"}, {"u": 2, "q": "17.问答题Describe the methodology for determining \"calling vessel types\" from three perspectives: factor analysis, methodology selection, and planning/design strategy.【答案】影响因素四层+统计保证率法（85%/95%）+预留设计船型策略", "hint": "【答案】影响因素四层+统计保证率法（85%/95%）+预留设计船型策略"}, {"u": 4, "q": "1.问答题（14.3分）A large coastal city plans a new coal unloading terminal (12M t/yr). Year-round dominant wind direction is NW. Describe dust pollution prevention measures (at least three).【答案】①堆场下风向布置；②防风网≥1.1倍堆高；③喷淋系统+增加含水率", "hint": "【答案】①堆场下风向布置；②防风网≥1.1倍堆高；③喷淋系统+增加含水率"}, {"u": 4, "q": "2.问答题（14.3分）Briefly describe the advantages and disadvantages of adopting a dolphin-type layout for liquid bulk cargo terminals.【答案】优点：横缆长→抵抗横向荷载能力强；缺点：只能单侧单船靠泊，泊位利用率低于一字形", "hint": "【答案】优点：横缆长→抵抗横向荷载能力强；缺点：只能单侧单船靠泊，泊位利用率低于一字形"}, {"u": 4, "q": "3.问答题（14.3分）Briefly describe the differences between multi-purpose berths and specialized berths. When should each be built?【答案】多用途=灵活适应多货种，专业泊位=极致效率", "hint": "【答案】多用途=灵活适应多货种（货种杂/量不大时），专业泊位=极致效率（单一货种达规模效益时）"}, {"u": 4, "q": "4.问答题（14.3分）A port plans a new large-scale crude oil import terminal in open sea (300,000 DWT, 20M t/yr). Conditions: coastline NE-SW, dominant wave ENE, H4%=1.5m, T=12s, alongshore current 1.0m/s, -20m isobath ~2,000m offshore. (1) Layout form? (2) Terminal axis orientation? (3) Straight-line vs dolphin-type berth length? (4) Does H4%=1.5m meet requirements?【答案】(1)离岸蝶形布置；(2)NE-SW；(3)一字形456m/蝶形437m；(4)停泊波高满足(≤2m)，但T=12s>8s需系泊模拟验证", "hint": "【答案】(1)离岸蝶形布置；(2)NE-SW；(3)一字形456m/蝶形437m；(4)停泊波高满足(≤2m)，但T=12s>8s需系泊模拟验证"}, {"u": 4, "q": "5.问答题（14.3分）A port on muddy open coast with multiple cargo types (containers 100,000DWT, coal 150,000DWT, crude oil 300,000DWT). (1) Select layout for each terminal type. (2) Does each need a breakwater (H4%=5.0m from NE)?【答案】(1)集装箱=顺岸式/煤炭=离岸一字式/原油=离岸蝶式；(2)集装箱需防波堤/煤炭可不建(允许作业波高≥1.2m)", "hint": "【答案】(1)集装箱=顺岸式/煤炭=离岸一字式/原油=离岸蝶式；(2)集装箱需防波堤/煤炭可不建(允许作业波高≥1.2m)"}, {"u": 4, "q": "6.问答题（14.3分）The previous code specified Lb=(1.4~1.5)L for dolphin-type layout, while the new code (JTS 165-2025) changed to Lb=(1.1~1.3)L. Analyze the main reasons.【答案】旧规范以首尾缆30°~45°推导k=1.4~1.5，但首尾缆对横纵向均无有效约束；新规范明确横缆约束横向+倒缆约束纵向，首尾缆仅为辅助→k降至1.1~1.3", "hint": "【答案】旧规范以首尾缆30°~45°推导k=1.4~1.5，但首尾缆对横纵向均无有效约束；新规范明确横缆约束横向+倒缆约束纵向，首尾缆仅为辅助→k降至1.1~1.3"}, {"u": 4, "q": "7.问答题（14.3分）Port A has 3 container berths (Q=146×10⁴t, R=2000t/d, G=5000t). Ship arrivals follow Poisson, service time negative exponential. (1) Is additional capacity needed? (2) Optimal berth count? (3) If R=3000t/d, still need more berths? (4) Evaluate and recommend. (5) Will efficiency estimates be fully realized?【答案】(1)Tw/Tb=0.454>0.1需增能力；(2)最优S=4；(3)R=3000时Tw/Tb=0.109可不增；(4)推荐提升效率(R=3000,S=3)，年省29.2%；(5)不一定，需考虑各环节协同匹配", "hint": "【答案】(1)Tw/Tb=0.454>0.1需增能力；(2)最优S=4；(3)R=3000时Tw/Tb=0.109可不增；(4)推荐提升效率(R=3000,S=3)，年省29.2%；(5)不一定，需考虑各环节协同匹配"}, {"u": 5, "q": "1.问答题Briefly describe the calculation procedure for the scale of seaport anchorages.【答案】锚位数：待泊=排队论/候潮=泊松分布/避风=经验公式；锚位面积：按锚泊方式几何计算", "hint": "【答案】锚位数：待泊=排队论/候潮=泊松分布/避风=经验公式；锚位面积：按锚泊方式几何计算"}, {"u": 5, "q": "2.问答题A port in long-period swell area. (1) What structural types for breakwater A, wharf shoreline B, and breakwater C? (2) Feasibility of berths on inner side of Breakwater A for ore export?【答案】(1)A=沉箱不透空/B=高桩透空/C=抛石透射式；(2)可行——内侧泊稳好+矿石皮带机水平运输成本低", "hint": "【答案】(1)A=沉箱不透空/B=高桩透空/C=抛石透射式；(2)可行——内侧泊稳好+矿石皮带机水平运输成本低"}, {"u": 5, "q": "3.问答题Briefly explain the concept of wind and current drift angle. What influencing factors need to be considered when calculating the drift angle according to Chinese standards?【答案】风流压偏角γ=航迹带偏离角；影响因素仅横风风级和横流流速两因素（按规范表6.4.2-2）", "hint": "【答案】风流压偏角γ=航迹带偏离角；影响因素仅横风风级和横流流速两因素（按规范表6.4.2-2）"}, {"u": 5, "q": "4.问答题Briefly describe the definition of nautical depth and its applicable conditions.【答案】适航水深=理论最低潮面至淤泥适航密度界面(1200~1250kg/m³)的垂直距离；适用：淤泥质海岸+浮泥层+安全论证+专用超声扫测", "hint": "【答案】适航水深=理论最低潮面至淤泥适航密度界面(1200~1250kg/m³)的垂直距离；适用：淤泥质海岸+浮泥层+安全论证+专用超声扫测"}, {"u": 5, "q": "5.问答题A container port has AWT/AST=0.35 (threshold 0.1). Within AWT: berth waiting 58%, channel waiting 32%, auxiliary 10%. Propose at least three categories of measures.【答案】①泊位效率调度优化；②航道管理优化；③多要素联动调度", "hint": "【答案】①泊位效率调度优化；②航道管理优化（分船型分时段）；③多要素联动调度（TOS系统提前协调）"}, {"u": 5, "q": "6.问答题A port has 8 multi-purpose berths, one-way channel with 4h tidal window. (1) Is S=8 sufficient via M/M/S? (2) Compare Plan A (S=9, R=1000) vs Plan B (S=8, R=1200). (3) Are M/M/S results reliable? (4) Recommend comprehensive plan.【答案】(1)Tw/Tb=0.635>0.50不满足；(2)Plan B更优（年省2380万+无需规划调整）；(3)不完全可靠——乘潮窗口破坏泊松假设+排队论低估实际等待，但相对比较有效；(4)推荐效率提升+航道全天候化协同方案", "hint": "【答案】(1)Tw/Tb=0.635>0.50不满足；(2)Plan B更优（年省2380万+无需规划调整）；(3)不完全可靠——乘潮窗口破坏泊松假设+排队论低估实际等待，但相对比较有效；(4)推荐效率提升+航道全天候化协同方案"}, {"u": 5, "q": "7.问答题(1) What basic conditions should a navigation channel satisfy? (2) How are seabed elevation datum planes determined? (3) Which has higher bed elevation between berthing area and channel?【答案】(1)足够水深/宽度/弯曲半径/净空/航行条件/导助航设施；(2)航道=设计通航水位/码头前沿=设计低水位；(3)一般航道更低(船体下沉)，乘潮时航道可高于码头前沿", "hint": "【答案】(1)足够水深/宽度/弯曲半径/净空/航行条件/导助航设施；(2)航道=设计通航水位/码头前沿=设计低水位；(3)一般航道更低(船体下沉)，乘潮时航道可高于码头前沿"}, {"u": 5, "q": "8.问答题What is harbor resonance? What are the hazards and mitigation measures?【答案】港湾共振=港池自振周期与外海长周期波重合致能量放大；危害=船舶剧烈振荡/断缆/通航威胁/港底冲刷/水位暴涨；缓解=调整港池尺度/优化防波堤减少透射增加外透", "hint": "【答案】港湾共振=港池自振周期与外海长周期波重合致能量放大；危害=船舶剧烈振荡/断缆/通航威胁/港底冲刷/水位暴涨；缓解=调整港池尺度/优化防波堤减少透射增加外透"}, {"u": 5, "q": "9.问答题A 300,000 DWT dry bulk berth on silty muddy coast. Two channel schemes: I (38km, 10° cross-current=0.21m/s) vs II (14km, 70° cross-current=1.13m/s). Threshold=1.0m/s. (1) Analyze trade-offs. (2) If Scheme II favored, propose comprehensive safety measures.【答案】(1)I=航行优但维护220万m³/yr/II=经济优但横流1.13m/s超阈值需专项论证；(2)加宽航道+缓流窗口通航+船舶操纵模拟+横风管制+导助航强化+应急拖轮", "hint": "【答案】(1)I=航行优但维护220万m³/yr/II=经济优但横流1.13m/s超阈值需专项论证；(2)加宽航道+缓流窗口通航+船舶操纵模拟+横风管制+导助航强化+应急拖轮"}];

// ===== HELPERS =====
function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function pick(arr, n) {
    const copy = [...arr];
    shuffle(copy);
    return copy.slice(0, n);
}

// ===== ANSWER MAPPING =====
function tfAnswer(a) {
    a = a.trim();
    if (a === 'A' || a === '对' || a === '正确') return '✓';
    if (a === 'B' || a === '错' || a === '错误') return '✗';
    return a;
}

// ===== GENERATE =====
const shortAnswers = [
    { q: 'Explain the differences in port planning survey involvement levels between Port General Layout Planning and Port Master Planning. What type of survey does each emphasize, and why?', a: `（1）港口布局规划（宏观层面，国家和省级）以经济社会调查为主，用于确定各港口的战略定位、功能分工、吞吐量预测和到港船型。
（2）港口总体规划（微观层面，单个港口）要求经济社会调查和自然条件调查均深入参与，但自然条件调查的深度和精度要求更高，需提供详细设计参数（如设计波高、设计水位），为港口选址、平面布置和工程设计提供依据。` },
    { q: 'Define nautical depth and list its four applicable conditions. Under what type of coastal condition is it most relevant?', a: `（1）适航水深是指从当地理论最低潮面至淤泥适航密度界面（通常1200~1250 kg/m³）之间的垂直距离。
（2）本质是将水底表层密度低、含水率高、具有流动性的浮泥层视为可利用通航水深的一部分。
（3）适用条件：航道位于淤泥质海岸且底部存在浮泥层；浮泥密度低于适航密度值（黏性浮泥1200~1220 kg/m³，沙质浮泥1230~1250 kg/m³）；须经安全论证；须采用对应频率的超声扫测设备进行水深测量。最适用于淤泥质海岸。` }
];

const compAnswers = [
    { q: '(Queuing Theory) Port B has 5 general cargo berths with R = 800 t/d/berth. Q = 1,460,000 t/yr, G = 2,000 t/vessel, 365 d/yr. Daily berth cost = 20,000 RMB, daily vessel cost = 50,000 RMB. Poisson arrivals, exponential service. (1) Is S=5 sufficient? (2) Optimal S? (3) Compare efficiency upgrade vs adding berth. (4) Discuss M/M/S limitations.', a: `(1) λ = Q/(G·365) = 2.0 艘/天。μ = R/G = 0.4 艘/天/泊位。S=5时 ρ = 1.0，系统饱和，不满足要求。
(2) S=6: 日总费用 202,000元；S=7: 日总费用 164,000元。最优S=7。
(3) 效率提升（R=1000, S=5）：日总费用 147,500元，低于S=7方案。原因：同时缩短作业时间和待泊时间，不增加泊位固定成本。
(4) 局限性：乘潮窗口破坏泊松假设；装卸时间未必指数分布；靠泊可能因航道拥堵等延迟；模型忽略辅助作业时间。但方案间相对比较仍有效。` },
    { q: '(Channel Alignment) 300,000 DWT terminal on silty muddy coast. Scheme A: 38km, 10° cross-current. Scheme B: 14km, 70° cross-current (1.13 m/s > 1.0 threshold). (1) Trade-offs? (2) Safety measures for Scheme B? (3) Sediment priority principle?', a: `(1) 方案A：安全好但38km航道年疏浚220万m³；方案B：经济优（14km/75万m³）但横流超阈值需专项论证。
(2) 措施：航道加宽；乘潮窗口通航；操纵模拟；横风7级停航；DGPS+实时流速监测；应急拖轮。
(3) 骤淤2~3m/次是主导风险，横流可通过运营管理。航道应先最小化淤积，后优化横流。` }
];

function generate() {
    const paper = document.getElementById('paper');
    
    const selMC = pick(MCQS, 30);
    const selTF = pick(TFS, 10);
    const selSA = pick(shortAnswers, 2);
    const selCA = pick(compAnswers, 2);
    
    // Compute MC answers
    const mcAnswers = selMC.map((q, i) => `${i+1}. ${q.a}`);
    const tfAnswerLetters = selTF.map((q, i) => `${i+1}. ${tfAnswer(q.a)}`);
    
    let html = '';
    
    // Header
    html += '<h1>Port Planning and Layout — Mock Examination</h1>';
    html += '<h2>港口规划与布置 随机模拟试卷</h2>';
    html += '<div class="info">Total Score: 100 pts &nbsp;|&nbsp; Duration: 120 min<br>Section A: Multiple Choice (30×1.5=45) &nbsp; Section B: True/False (10×1=10) &nbsp; Section C: Short Answer (2×10=20) &nbsp; Section D: Comprehensive (2×12.5=25)</div>';
    html += '<div class="name-line">Name: ______________________ &nbsp;&nbsp; Student ID: ______________________ &nbsp;&nbsp; Score: ______</div>';
    
    // Section A
    html += '<div class="section-title">Section A: Multiple Choice (30 × 1.5 pts = 45 pts)</div>';
    html += '<div class="section-desc">Select the best answer for each question.</div>';
    selMC.forEach((q, i) => {
        html += `<div class="q-block"><div class="q-text mc">${i+1}. ${q.q}</div>`;
        ['A','B','C','D'].forEach(l => {
            if (q.o[l] && q.o[l].trim()) {
                html += `<div class="opt-text">${l}. ${q.o[l]}</div>`;
            }
        });
        html += '</div>';
    });
    
    // Section B
    html += '<div class="section-title">Section B: True/False (10 × 1 pt = 10 pts)</div>';
    html += '<div class="section-desc">Mark ✓ (True) or ✗ (False) for each statement.</div>';
    selTF.forEach((q, i) => {
        html += `<div class="q-block"><div class="q-text tf">${i+1}. ${q.q}</div></div>`;
    });
    
    // Section C
    html += '<div class="section-title">Section C: Short Answer (2 × 10 pts = 20 pts)</div>';
    html += '<div class="section-desc">Answer concisely but completely. Show all key points.</div>';
    selSA.forEach((sa, i) => {
        html += `<div class="sa-block"><div class="sa-text">${i+1}. ${sa.q}</div><div class="sa-space"></div></div>`;
    });
    
    // Section D
    html += '<div class="section-title">Section D: Comprehensive Analysis (2 × 12.5 pts = 25 pts)</div>';
    html += '<div class="section-desc">Show all calculations and reasoning. Partial credit is awarded.</div>';
    selCA.forEach((ca, i) => {
        html += `<div class="ca-block"><div class="ca-text">${i+1}. ${ca.q}</div><div class="ca-space"></div></div>`;
    });
    
    // Answers
    html += '<div class="answers hidden" id="answers">';
    html += '<div class="ans-section"><h3>Section A: Multiple Choice</h3>';
    // 5 per row
    for (let i = 0; i < mcAnswers.length; i += 5) {
        html += '<div class="ans-mc">' + mcAnswers.slice(i, i+5).join('&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;') + '</div>';
    }
    html += '</div>';
    
    html += '<div class="ans-section"><h3>Section B: True/False</h3>';
    for (let i = 0; i < tfAnswerLetters.length; i += 5) {
        html += '<div class="ans-tf">' + tfAnswerLetters.slice(i, i+5).join('&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;') + '</div>';
    }
    html += '</div>';
    
    html += '<div class="ans-section"><h3>Section C: Short Answer — 答案要点</h3>';
    selSA.forEach((sa, i) => {
        html += `<div class="ans-sa"><h4>${i+1}.</h4>${sa.a}</div>`;
    });
    html += '</div>';
    
    html += '<div class="ans-section"><h3>Section D: Comprehensive Analysis — 答案要点</h3>';
    selCA.forEach((ca, i) => {
        html += `<div class="ans-ca"><h4>${i+1}.</h4>${ca.a.replace(/\n/g, '<br>')}</div>`;
    });
    html += '</div>';
    
    html += '</div>';
    
    paper.innerHTML = html;
    document.getElementById('answers').classList.add('hidden');
}

function toggleAnswers() {
    const el = document.getElementById('answers');
    if (!el) return;
    el.classList.toggle('hidden');
}

window.onload = generate;
</script>
